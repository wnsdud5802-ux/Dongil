<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="재고관리" />
  <title>재고관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f7; min-height: 100vh; max-width: 430px; margin: 0 auto; }

    .header { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .header-title { font-size: 18px; font-weight: 700; color: #1a1a1a; flex: 1; }
    .backup-btns { display: flex; gap: 5px; }
    .btn-util { font-size: 11px; padding: 5px 8px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #666; cursor: pointer; }

    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 16px; }
    .tab-btn { flex: 1; padding: 11px 0; border: none; background: none; font-size: 14px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2.5px solid transparent; font-family: inherit; }
    .tab-btn.active { color: #1a1a1a; font-weight: 700; border-bottom-color: #1a1a1a; }

    .content { padding: 16px; padding-bottom: 100px; }
    .search-input { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1.5px solid #e8e8e8; font-size: 14px; background: #fff; outline: none; margin-bottom: 10px; }

    .sup-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .sup-scroll::-webkit-scrollbar { display: none; }
    .sup-chip { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 12px; font-weight: 500; color: #666; cursor: pointer; white-space: nowrap; }
    .sup-chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    .list { display: flex; flex-direction: column; gap: 10px; }
    .card { background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06); gap: 12px; }
    .card-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
    .badge { font-size: 11px; font-weight: 600; background: #f0f0f0; color: #555; padding: 2px 8px; border-radius: 8px; }
    .note-badge { font-size: 11px; color: #888; padding: 2px 6px; background: #fff8e1; border-radius: 8px; }
    .card-sub { font-size: 11px; color: #aaa; margin-top: 3px; }
    .card-price { font-size: 17px; font-weight: 800; color: #1a1a1a; text-align: right; }

    /* 날짜 입력창 모바일 버그 수정 */
    input[type="text"], input[type="number"], input[type="date"], select, textarea {
      width: 100% !important; display: block; padding: 12px; border: 1.5px solid #e8e8e8; border-radius: 10px;
      font-size: 15px; color: #1a1a1a; background: #fafafa; outline: none; font-family: inherit; -webkit-appearance: none;
    }
    input[type="date"] { min-height: 48px; position: relative; }

    .fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: #1a1a1a; color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 300; display: flex; align-items: flex-end; justify-content: center; }
    .overlay.hidden { display: none; }
    .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 0 20px 40px; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; position: sticky; top: 0; background: #fff; z-index: 1; }
    .sheet-title { font-size: 17px; font-weight: 700; }
    .close-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }

    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 5px; }
    .photo-upload-area { width: 100%; height: 100px; border: 2px dashed #e0e0e0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; margin-bottom: 14px; color: #aaa; gap: 6px; }
    .photo-preview { width: 100%; height: 180px; object-fit: cover; border-radius: 12px; margin-bottom: 10px; }
    
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn-primary { flex: 1; padding: 14px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn-danger { padding: 14px; background: #fff; color: #ff4444; border: 1.5px solid #ff4444; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .btn-secondary { padding: 14px; background: #f5f5f7; color: #333; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    
    .purchase-form-card { background: #f9f9f9; border-radius: 14px; padding: 14px; border: 1.5px solid #efefef; margin-bottom: 15px; }
    .purchase-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
    .note-box { background: #fff8e1; border-radius: 10px; padding: 12px; font-size: 13px; color: #555; margin-bottom: 15px; white-space: pre-wrap; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); padding: 10px 20px; background: #1a1a1a; color: #fff; border-radius: 30px; font-size: 13px; z-index: 1000; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-title">📦 재고관리</span>
  <div class="backup-btns">
    <button class="btn-util" onclick="exportData()">백업</button>
    <button class="btn-util" onclick="document.getElementById('import-file').click()">복구</button>
    <input type="file" id="import-file" style="display:none" onchange="importData(this)">
  </div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inventory')">재고 목록</button>
  <button class="tab-btn" onclick="switchTab('suppliers')">거래처</button>
</div>

<div class="content" id="tab-inventory">
  <input class="search-input" placeholder="🔍 품목명 또는 메모 검색" oninput="onSearch(this.value)" />
  <div class="sup-scroll" id="sup-scroll"></div>
  <div class="list" id="item-list"></div>
</div>

<div class="content" id="tab-suppliers" style="display:none">
  <div class="list" id="supplier-list"></div>
</div>

<button class="fab" onclick="onFab()">+</button>
<div class="overlay hidden" id="overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" id="sheet"></div>
</div>
<div class="toast hidden" id="toast"></div>

<script>
  let db = JSON.parse(localStorage.getItem('stockdb') || '{"items":[],"suppliers":[]}');
  let currentTab = 'inventory';
  let filterSupplier = '전체';
  let searchQ = '';
  let selectedId = null;
  let modalMode = null;

  function save() { localStorage.setItem('stockdb', JSON.stringify(db)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function today() { return new Date().toISOString().split('T')[0]; }

  function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'error' ? '#ff4444' : '#1a1a1a';
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2000);
  }

  // 데이터 백업 기능
  function exportData() {
    const blob = new Blob([JSON.stringify(db)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `재고관리_백업_${today()}.json`;
    a.click();
  }

  // 데이터 복구 기능
  function importData(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.items && data.suppliers) {
          db = data;
          save();
          render();
          showToast('데이터가 복구되었습니다!');
        }
      } catch(err) { showToast('잘못된 파일입니다.', 'error'); }
    };
    reader.readAsText(file);
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === (tab === 'inventory' ? 0 : 1)));
    document.getElementById('tab-inventory').style.display = tab === 'inventory' ? '' : 'none';
    document.getElementById('tab-suppliers').style.display = tab === 'suppliers' ? '' : 'none';
    render();
  }

  function onSearch(v) { searchQ = v; render(); }
  function onFab() { currentTab === 'inventory' ? openAddItem() : openAddSupplier(); }

  function render() {
    if (currentTab === 'inventory') renderItems();
    else renderSuppliers();
  }

  function sortedSuppliers() {
    return [...db.suppliers].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  }

  function renderSupplierFilter() {
    const el = document.getElementById('sup-scroll');
    const chips = [{ id: '전체', name: '전체' }, ...sortedSuppliers()];
    el.innerHTML = chips.map(s => `<button class="sup-chip${filterSupplier === s.id ? ' active' : ''}" onclick="setSupFilter('${s.id}')">${s.name}</button>`).join('');
  }

  function setSupFilter(id) { filterSupplier = id; renderItems(); }

  function renderItems() {
    renderSupplierFilter();
    const items = db.items.filter(item => {
      const ms = item.name.includes(searchQ) || (item.note || '').includes(searchQ);
      if (filterSupplier === '전체') return ms;
      return ms && (item.purchases || []).some(p => p.supplierId === filterSupplier);
    });
    const el = document.getElementById('item-list');
    if (!items.length) { el.innerHTML = '<div class="empty">품목이 없습니다.</div>'; return; }
    el.innerHTML = items.map(item => {
      const sups = [...new Set((item.purchases || []).map(p => db.suppliers.find(s => s.id === p.supplierId)?.name).filter(Boolean))];
      return `<div class="card" onclick="openDetail('${item.id}')">
        ${item.photo ? `<img src="${item.photo}" style="width:50px;height:50px;object-fit:cover;border-radius:8px">` : ''}
        <div style="flex:1">
          <div class="card-name">${item.name}</div>
          <div class="card-meta">${sups.map(n => `<span class="badge">${n}</span>`).join('')}</div>
        </div>
        <div class="card-price">₩${(item.price || 0).toLocaleString()}</div>
      </div>`;
    }).join('');
  }

  function renderSuppliers() {
    const el = document.getElementById('supplier-list');
    el.innerHTML = sortedSuppliers().map(s => `<div class="card" onclick="openEditSupplier('${s.id}')">
      <div style="flex:1"><div class="card-name">${s.name}</div><div class="card-sub">${s.contact || ''}</div></div>
      <div style="color:#ccc">›</div>
    </div>`).join('');
  }

  function openModal(html) {
    document.getElementById('sheet').innerHTML = html;
    document.getElementById('overlay').classList.remove('hidden');
  }
  function closeModal() { document.getElementById('overlay').classList.add('hidden'); render(); }

  // 마진 계산 함수
  function updateMarginPreview() {
    const buy = Number(document.getElementById('f-buyprice')?.value) || 0;
    const sell = Number(document.getElementById('f-price')?.value) || 0;
    const el = document.getElementById('margin-preview');
    if (!el) return;
    if (buy > 0 && sell > 0) {
      const m = ((sell - buy) / buy * 100).toFixed(1);
      el.textContent = `마진 ${m}% (차액 ₩${(sell - buy).toLocaleString()})`;
      el.style.color = (sell - buy) >= 0 ? '#4caf50' : '#ff4444';
    } else el.textContent = '';
  }

  function openAddItem() {
    modalMode = 'add_item';
    const sups = sortedSuppliers();
    const opts = `<option value="">선택 안 함</option>` + sups.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    openModal(`
      <div class="sheet-header"><span class="sheet-title">품목 추가</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="form-group"><label>품목명 *</label><input type="text" id="f-name"></div>
      <div class="photo-upload-area" onclick="document.getElementById('f-photo').click()">📷 사진 추가</div>
      <input type="file" id="f-photo" style="display:none" onchange="previewPhoto(this)">
      <img id="f-prev" class="photo-preview" style="display:none">
      <div class="form-group"><label>매입가 *</label><input type="number" id="f-buyprice" oninput="updateMarginPreview()"></div>
      <div class="form-group"><label>날짜</label><input type="date" id="f-date" value="${today()}"></div>
      <div class="form-group"><label>거래처</label><select id="f-sup">${opts}</select></div>
      <div class="form-group"><label>판매가</label><input type="number" id="f-price" oninput="updateMarginPreview()"></div>
      <div id="margin-preview" style="font-size:12px;margin-bottom:15px"></div>
      <button class="btn-primary" onclick="saveItem()">추가하기</button>
    `);
  }

  let tempPhoto = "";
  function previewPhoto(input) {
    const reader = new FileReader();
    reader.onload = e => {
      tempPhoto = e.target.result;
      document.getElementById('f-prev').src = tempPhoto;
      document.getElementById('f-prev').style.display = 'block';
    };
    reader.readAsDataURL(input.files[0]);
  }

  function saveItem() {
    const name = document.getElementById('f-name').value.trim();
    if (!name) return showToast('이름을 입력하세요', 'error');
    const buy = Number(document.getElementById('f-buyprice').value);
    
    if (modalMode === 'add_item') {
      const item = {
        id: uid(),
        name,
        price: Number(document.getElementById('f-price').value) || 0,
        photo: tempPhoto,
        note: '',
        purchases: [{ id: uid(), date: document.getElementById('f-date').value, amount: buy, supplierId: document.getElementById('f-sup').value, note: '' }],
        sales: []
      };
      db.items.unshift(item);
    } else {
      db.items = db.items.map(i => i.id === selectedId ? { ...i, name, price: Number(document.getElementById('f-price').value), note: document.getElementById('f-note').value } : i);
    }
    save(); closeModal(); showToast('저장되었습니다.');
  }

  function openDetail(id) {
    selectedId = id;
    const item = db.items.find(i => i.id === id);
    const lastBuy = item.purchases.length ? item.purchases[item.purchases.length-1].amount : 0;
    const margin = lastBuy ? ((item.price - lastBuy) / lastBuy * 100).toFixed(1) : 0;

    openModal(`
      <div class="sheet-header"><span class="sheet-title">${item.name}</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      ${item.photo ? `<img src="${item.photo}" class="photo-preview">` : ''}
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px">
        <div><div style="font-size:12px;color:#aaa">판매가</div><div style="font-size:24px;font-weight:800">₩${item.price.toLocaleString()}</div></div>
        <div style="text-align:right; color:${margin>=0?'#4caf50':'#ff4444'}">마진 ${margin}%</div>
      </div>
      ${item.note ? `<div class="note-box">${item.note}</div>` : ''}
      <div class="btn-row">
        <button class="btn-secondary" onclick="openEditItem('${id}')">정보 수정</button>
        <button class="btn-primary" onclick="addPurchaseRecord('${id}')">매입 추가</button>
      </div>
    `);
  }

  function openEditItem(id) {
    const item = db.items.find(i => i.id === id);
    modalMode = 'edit_item';
    openModal(`
      <div class="sheet-header"><span class="sheet-title">품목 수정</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="form-group"><label>품목명</label><input type="text" id="f-name" value="${item.name}"></div>
      <div class="form-group"><label>판매가</label><input type="number" id="f-price" value="${item.price}"></div>
      <div class="form-group"><label>메모</label><textarea id="f-note">${item.note || ''}</textarea></div>
      <div class="btn-row">
        <button class="btn-danger" onclick="deleteItem('${id}')">삭제</button>
        <button class="btn-primary" onclick="saveItem()">저장</button>
      </div>
    `);
  }

  function deleteItem(id) {
    if(confirm('정말 삭제하시겠습니까?')) {
      db.items = db.items.filter(i => i.id !== id);
      save(); closeModal();
    }
  }

  function openAddSupplier() {
    modalMode = 'add_sup';
    openModal(`
      <div class="sheet-header"><span class="sheet-title">거래처 추가</span><button class="close-btn" onclick="closeModal()">✕</button></div>
      <div class="form-group"><label>거래처명 *</label><input type="text" id="s-name"></div>
      <div class="form-group"><label>연락처</label><input type="text" id="s-contact"></div>
      <button class="btn-primary" onclick="saveSupplier()">거래처 등록</button>
    `);
  }

  function saveSupplier() {
    const name = document.getElementById('s-name').value.trim();
    if (!name) return;
    db.suppliers.push({ id: uid(), name, contact: document.getElementById('s-contact').value });
    save(); closeModal();
  }

  render();
</script>
</body>
</html>
