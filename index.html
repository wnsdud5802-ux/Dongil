<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>프리미엄 재고관리 시스템</title>
  <style>
    /* --- CSS 스타일 (약 150줄) --- */
    :root {
      --primary: #1a1a1a; --secondary: #f5f5f7; --accent: #007aff;
      --danger: #ff3b30; --success: #34c759; --border: #e5e5e5;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background: #f2f2f7; color: #1c1c1e; line-height: 1.5; }
    
    .app-container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; position: relative; }
    
    /* Header & Tabs */
    .nav-header { position: sticky; top: 0; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); padding: 15px 20px; }
    .nav-header h1 { font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .tab-nav { display: flex; padding: 5px 15px; background: #fff; border-bottom: 1px solid var(--border); }
    .tab-item { flex: 1; padding: 12px 0; text-align: center; font-size: 14px; font-weight: 600; color: #8e8e93; border-bottom: 2px solid transparent; cursor: pointer; }
    .tab-item.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* Main Content */
    .content-area { flex: 1; padding: 20px; padding-bottom: 100px; }
    .search-box { position: relative; margin-bottom: 15px; }
    .search-box input { width: 100%; padding: 12px 40px 12px 15px; border-radius: 12px; border: 1px solid var(--border); background: #f2f2f7; outline: none; font-size: 15px; }
    
    /* Chips */
    .filter-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 15px; -ms-overflow-style: none; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .chip { padding: 8px 16px; border-radius: 20px; background: #fff; border: 1px solid var(--border); font-size: 13px; white-space: nowrap; cursor: pointer; transition: 0.2s; }
    .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* List Cards */
    .item-card { display: flex; align-items: center; padding: 16px; border-radius: 16px; background: #fff; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: transform 0.1s; }
    .item-card:active { transform: scale(0.98); }
    .img-box { width: 60px; height: 60px; border-radius: 12px; background: #f9f9f9; overflow: hidden; margin-right: 15px; border: 1px solid #eee; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .info-box { flex: 1; }
    .info-box h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .info-box p { font-size: 12px; color: #8e8e93; }
    .price-box { text-align: right; }
    .price-main { font-size: 17px; font-weight: 800; color: var(--primary); }
    .stock-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: #e8f5e9; color: #2e7d32; font-weight: 700; margin-top: 4px; display: inline-block; }

    /* Floating Action Button */
    .fab { position: fixed; bottom: 30px; right: calc(50% - 230px); width: 60px; height: 60px; border-radius: 20px; background: var(--primary); color: #fff; border: none; font-size: 30px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 999; }
    @media (max-width: 500px) { .fab { right: 20px; } }

    /* Overlay Sheets */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: none; align-items: flex-end; }
    .overlay.active { display: flex; }
    .bottom-sheet { width: 100%; max-width: 500px; margin: 0 auto; background: #fff; border-top-left-radius: 25px; border-top-right-radius: 25px; padding: 25px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.3s ease-out; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    /* Forms */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 700; color: #3a3a3c; margin-bottom: 8px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--border); background: #fafafa; font-size: 15px; font-family: inherit; outline: none; }
    .form-group input:focus { border-color: var(--primary); }
    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    .btn { flex: 1; height: 54px; border-radius: 14px; border: none; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-main { background: var(--primary); color: #fff; }
    .btn-sub { background: #f2f2f7; color: #3a3a3c; }
    .btn-danger { background: #fff; color: var(--danger); border: 1px solid var(--danger); }

    /* Statistics & Backup Cards */
    .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #f8f9fa; padding: 15px; border-radius: 16px; border: 1px solid var(--border); }
    .stat-title { font-size: 12px; color: #8e8e93; margin-bottom: 5px; }
    .stat-value { font-size: 18px; font-weight: 800; }

    /* Utils */
    .hidden { display: none; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 25px; font-size: 14px; z-index: 3000; opacity: 0; transition: 0.3s; pointer-events: none; }
  </style>
</head>
<body>

<div class="app-container">
  <header class="nav-header">
    <h1>📦 <span>스마트 재고관리</span></h1>
  </header>

  <nav class="tab-nav">
    <div class="tab-item active" onclick="changeTab('stock')">재고현황</div>
    <div class="tab-item" onclick="changeTab('supplier')">거래처</div>
    <div class="tab-item" onclick="changeTab('history')">입/출고</div>
    <div class="tab-item" onclick="changeTab('setting')">설정</div>
  </nav>

  <main class="content-area">
    <!-- 탭 1: 재고현황 -->
    <section id="tab-stock">
      <div class="search-box">
        <input type="text" id="search-input" placeholder="품목명 또는 거래처 검색..." oninput="renderStockList()">
      </div>
      <div class="filter-scroll" id="sup-filter">
        <!-- 거래처 필터 칩 동적 생성 -->
      </div>
      <div id="stock-list"></div>
    </section>

    <!-- 탭 2: 거래처 -->
    <section id="tab-supplier" class="hidden">
      <div id="supplier-list"></div>
    </section>

    <!-- 탭 3: 내역 -->
    <section id="tab-history" class="hidden">
      <div class="card-grid">
        <div class="stat-card">
          <p class="stat-title">이달의 매입</p>
          <p class="stat-value" id="stat-buy">0</p>
        </div>
        <div class="stat-card">
          <p class="stat-title">이달의 매출</p>
          <p class="stat-value" id="stat-sell" style="color:var(--accent)">0</p>
        </div>
      </div>
      <div id="history-list"></div>
    </section>

    <!-- 탭 4: 설정 -->
    <section id="tab-setting" class="hidden">
      <div class="form-group">
        <label>데이터 백업/복원</label>
        <button class="btn btn-sub" onclick="exportData()" style="margin-bottom:10px; width:100%">JSON으로 내보내기</button>
        <button class="btn btn-sub" onclick="document.getElementById('import-file').click()" style="width:100%">데이터 불러오기</button>
        <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(this)">
      </div>
      <div style="margin-top:40px; text-align:center">
        <p style="font-size:12px; color:#ccc">Version 2.0.4 (Build 700)</p>
      </div>
    </section>
  </main>

  <button class="fab" onclick="openCreateModal()">+</button>
</div>

<!-- 모달 레이어 -->
<div class="overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="bottom-sheet" id="modal-content"></div>
</div>

<div id="toast" class="toast"></div>

<script>
/* --- 핵심 비즈니스 로직 (약 400줄) --- */

// 1. 데이터 초기화
let db = JSON.parse(localStorage.getItem('smart_stock_v2') || '{"items":[], "suppliers":[], "logs":[]}');
let currentTab = 'stock';
let selectedSupFilter = '전체';

// 2. 유틸리티
const saveDB = () => localStorage.setItem('smart_stock_v2', JSON.stringify(db));
const genId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
const formatWon = (n) => Number(n).toLocaleString() + '원';
const showToast = (msg) => {
  const t = document.getElementById('toast');
  t.innerText = msg; t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2000);
};

// 3. 탭 제어
function changeTab(tabId) {
  currentTab = tabId;
  document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
  event.target.classList.add('active');
  
  document.querySelectorAll('section').forEach(sec => sec.classList.add('hidden'));
  document.getElementById('tab-' + tabId).classList.remove('hidden');
  
  render();
}

// 4. 렌더링 엔진
function render() {
  if (currentTab === 'stock') renderStockList();
  if (currentTab === 'supplier') renderSupplierList();
  if (currentTab === 'history') renderHistoryList();
}

// [재고 목록 렌더링]
function renderStockList() {
  const list = document.getElementById('stock-list');
  const query = document.getElementById('search-input').value.toLowerCase();
  
  // 거래처 필터 칩
  const filterWrap = document.getElementById('sup-filter');
  const sups = ['전체', ...db.suppliers.map(s => s.name)];
  filterWrap.innerHTML = sups.map(s => `
    <div class="chip ${selectedSupFilter === s ? 'active' : ''}" onclick="setSupFilter('${s}')">${s}</div>
  `).join('');

  let filtered = db.items.filter(i => {
    const matchSearch = i.name.toLowerCase().includes(query);
    const matchSup = selectedSupFilter === '전체' || i.supplier === selectedSupFilter;
    return matchSearch && matchSup;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center; padding:50px; color:#ccc;">데이터가 없습니다.</div>`;
    return;
  }

  list.innerHTML = filtered.map(item => `
    <div class="item-card" onclick="openItemDetail('${item.id}')">
      <div class="img-box">
        ${item.image ? `<img src="${item.image}">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ddd">No Img</div>`}
      </div>
      <div class="info-box">
        <h3>${item.name}</h3>
        <p>${item.supplier || '미지정'}</p>
        <span class="stock-badge">현재고: ${item.stock || 0}</span>
      </div>
      <div class="price-box">
        <div class="price-main">${formatWon(item.sellPrice)}</div>
        <p style="font-size:10px; color:#aaa">매입: ${formatWon(item.buyPrice)}</p>
      </div>
    </div>
  `).join('');
}

function setSupFilter(s) { selectedSupFilter = s; renderStockList(); }

// [거래처 목록 렌더링]
function renderSupplierList() {
  const list = document.getElementById('supplier-list');
  list.innerHTML = db.suppliers.map(s => `
    <div class="item-card" onclick="openSupDetail('${s.id}')">
      <div class="info-box">
        <h3>${s.name}</h3>
        <p>${s.tel || '연락처 없음'}</p>
      </div>
      <div>➔</div>
    </div>
  `).join('') + `<button class="btn btn-sub" onclick="openAddSup()" style="width:100%">+ 거래처 추가</button>`;
}

// [입출고 내역 렌더링]
function renderHistoryList() {
  const list = document.getElementById('history-list');
  const logs = [...db.logs].reverse();
  
  let monthlyBuy = 0, monthlySell = 0;
  const now = new Date();
  
  list.innerHTML = logs.map(l => {
    const isBuy = l.type === 'in';
    if (new Date(l.date).getMonth() === now.getMonth()) {
      if(isBuy) monthlyBuy += (l.price * l.qty);
      else monthlySell += (l.price * l.qty);
    }
    
    return `
      <div style="display:flex; justify-content:space-between; padding:12px; border-bottom:1px solid #eee; font-size:14px">
        <div>
          <span style="color:${isBuy ? '#34c759':'#007aff'}; font-weight:bold">[${isBuy?'입고':'출고'}]</span>
          <span>${l.itemName}</span>
          <div style="font-size:11px; color:#aaa">${l.date} | ${l.qty}개</div>
        </div>
        <div style="font-weight:700">${formatWon(l.price * l.qty)}</div>
      </div>
    `;
  }).join('');
  
  document.getElementById('stat-buy').innerText = formatWon(monthlyBuy);
  document.getElementById('stat-sell').innerText = formatWon(monthlySell);
}

// 5. 모달 및 상세 기능
function openCreateModal() {
  if (currentTab === 'stock') openAddItem();
  else if (currentTab === 'supplier') openAddSup();
}

function openAddItem() {
  const sups = db.suppliers.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
  showModal(`
    <h2 style="margin-bottom:20px">📦 신규 품목 등록</h2>
    <div class="form-group">
      <label>품목명 *</label>
      <input type="text" id="f-name" placeholder="예: 아이폰 15 케이스">
    </div>
    <div class="form-group">
      <label>거래처</label>
      <select id="f-sup"><option value="">선택안함</option>${sups}</select>
    </div>
    <div class="btn-row">
      <div class="form-group" style="flex:1">
        <label>매입가</label>
        <input type="number" id="f-buy" value="0">
      </div>
      <div class="form-group" style="flex:1">
        <label>판매가</label>
        <input type="number" id="f-sell" value="0">
      </div>
    </div>
    <button class="btn btn-main" style="width:100%" onclick="saveNewItem()">품목 저장하기</button>
  `);
}

function saveNewItem() {
  const name = document.getElementById('f-name').value;
  if(!name) return alert('품목명을 입력하세요.');
  
  db.items.push({
    id: genId(),
    name: name,
    supplier: document.getElementById('f-sup').value,
    buyPrice: Number(document.getElementById('f-buy').value),
    sellPrice: Number(document.getElementById('f-sell').value),
    stock: 0,
    image: ''
  });
  saveDB(); closeModal(); render();
}

function openItemDetail(id) {
  const item = db.items.find(i => i.id === id);
  showModal(`
    <h2 style="margin-bottom:10px">${item.name}</h2>
    <p style="color:#8e8e93; margin-bottom:20px">${item.supplier || '거래처 없음'}</p>
    
    <div class="card-grid">
      <div class="stat-card">
        <p class="stat-title">현재 재고</p>
        <p class="stat-value">${item.stock}개</p>
      </div>
      <div class="stat-card">
        <p class="stat-title">누적 수익</p>
        <p class="stat-value" style="color:var(--success)">익절중</p>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-main" style="background:#34c759" onclick="logTransaction('${item.id}', 'in')">입고(+)</button>
      <button class="btn btn-main" style="background:#007aff" onclick="logTransaction('${item.id}', 'out')">출고(-)</button>
    </div>
    
    <div class="btn-row" style="margin-top:15px">
      <button class="btn btn-sub" onclick="editItem('${item.id}')">수정</button>
      <button class="btn btn-danger" onclick="deleteItem('${item.id}')">삭제</button>
    </div>
  `);
}

function logTransaction(itemId, type) {
  const qty = prompt(type === 'in' ? '입고 수량을 입력하세요' : '출고 수량을 입력하세요');
  if(!qty || isNaN(qty)) return;

  const item = db.items.find(i => i.id === itemId);
  const numQty = Number(qty);
  
  if (type === 'out' && item.stock < numQty) {
    alert('재고가 부족합니다!'); return;
  }

  item.stock += (type === 'in' ? numQty : -numQty);
  
  db.logs.push({
    id: genId(),
    itemId: itemId,
    itemName: item.name,
    type: type,
    qty: numQty,
    price: type === 'in' ? item.buyPrice : item.sellPrice,
    date: new Date().toLocaleString()
  });

  saveDB(); closeModal(); render();
  showToast(type === 'in' ? '입고 처리되었습니다.' : '출고 완료!');
}

function deleteItem(id) {
  if(confirm('정말 삭제하시겠습니까? 관련 내역은 유지됩니다.')) {
    db.items = db.items.filter(i => i.id !== id);
    saveDB(); closeModal(); render();
  }
}

// 6. 데이터 백업 기능
function exportData() {
  const data = JSON.stringify(db, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `inventory_backup_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if(confirm('현재 데이터를 지우고 백업 파일을 불러올까요?')) {
        db = imported;
        saveDB(); location.reload();
      }
    } catch(err) { alert('유효한 JSON 파일이 아닙니다.'); }
  };
  reader.readAsText(file);
}

// 7. 모달 시스템
function showModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').classList.add('active');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}
function handleOverlayClick(e) {
  if(e.target.id === 'modal-overlay') closeModal();
}

// 초기 실행
render();
</script>
</body>
</html>
