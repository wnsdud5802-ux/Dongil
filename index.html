<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="재고관리" />
<title>재고관리</title>

<style>
body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background:#f5f5f7; max-width:430px; margin:0 auto; }
.header { background:#fff; padding:14px; font-weight:700; border-bottom:1px solid #ddd; }
.list { padding:16px; }
.card { background:#fff; padding:14px; border-radius:10px; margin-bottom:10px; cursor:pointer; }
.fab { position:fixed; bottom:20px; right:20px; width:56px; height:56px; background:#000; color:#fff; border:none; border-radius:50%; font-size:26px; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; }
.sheet { background:#fff; padding:20px; position:absolute; bottom:0; width:100%; border-radius:20px 20px 0 0; }
</style>
</head>

<body>

<div class="header">📦 재고관리</div>
<div class="list" id="list"></div>
<button class="fab" onclick="openAdd()">+</button>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
var db = JSON.parse(localStorage.getItem("stockdb") || '{"items":[]}');

function save(){
  localStorage.setItem("stockdb", JSON.stringify(db));
}

function render(){
  var el = document.getElementById("list");

  if(db.items.length === 0){
    el.innerHTML = "데이터 없음";
    return;
  }

  var html = "";
  db.items.forEach(function(i){
    html += "<div class='card' onclick='openDetail(\""+i.id+"\")'>" +
              "<b>"+i.name+"</b><br>" +
              "₩"+(i.price||0).toLocaleString()+
            "</div>";
  });

  el.innerHTML = html;
}

function uid(){
  return Date.now().toString(36);
}

/* 추가 */
function openAdd(){
  var html = "";
  html += "<h3>품목 추가</h3>";
  html += "<input id='name' placeholder='이름'><br><br>";
  html += "<input id='price' type='number' placeholder='가격'><br><br>";
  html += "<button onclick='saveItem()'>저장</button>";

  openModal(html);
}

function saveItem(){
  var name = document.getElementById("name").value;
  var price = Number(document.getElementById("price").value);

  if(!name){
    alert("이름 입력");
    return;
  }

  db.items.push({
    id: uid(),
    name: name,
    price: price
  });

  save();
  closeModal();
  render();
}

/* 상세 */
function openDetail(id){
  var item = db.items.find(i=>i.id===id);

  var html = "";
  html += "<h3>"+item.name+"</h3>";
  html += "₩"+item.price+"<br><br>";
  html += "<button onclick='deleteItem(\""+id+"\")'>삭제</button>";

  openModal(html);
}

/* 삭제 */
function deleteItem(id){
  if(!confirm("삭제?")) return;

  db.items = db.items.filter(i=>i.id!==id);
  save();
  closeModal();
  render();
}

/* 모달 */
function openModal(html){
  document.getElementById("sheet").innerHTML = html;
  document.getElementById("overlay").style.display = "block";
}

function closeModal(){
  document.getElementById("overlay").style.display = "none";
}

document.getElementById("overlay").onclick = function(e){
  if(e.target.id==="overlay") closeModal();
};

render();
</script>

</body>
</html>
