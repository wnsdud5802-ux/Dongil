<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="재고관리" />
  <title>재고관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f7; min-height: 100vh; max-width: 430px; margin: 0 auto; }
    .header { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; padding: 14px 20px; display: flex; align-items: center; gap: 8px; }
    .header-title { font-size: 18px; font-weight: 700; color: #1a1a1a; }
    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 16px; }
    .tab-btn { flex: 1; padding: 11px 0; border: none; background: none; font-size: 14px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2.5px solid transparent; font-family: inherit; }
    .tab-btn.active { color: #1a1a1a; font-weight: 700; border-bottom-color: #1a1a1a; }
    .content { padding: 16px; padding-bottom: 100px; }
    .search-input { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid #e8e8e8; font-size: 14px; background: #fff; outline: none; color: #1a1a1a; font-family: inherit; margin-bottom: 10px; }
    .sup-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .sup-scroll::-webkit-scrollbar { display: none; }
    .sup-chip { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 12px; font-weight: 500; color: #666; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .sup-chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    
    .card { background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06); gap: 12px; }
    .card-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; flex-shrink: 0; }
    .card-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
    .badge { font-size: 11px; font-weight: 600; background: #f0f0f0; color: #555; padding: 2px 8px; border-radius: 8px; }
    .note-badge { font-size: 11px; color: #888; padding: 2px 6px; background: #fff8e1; border-radius: 8px; }
    .card-sub { font-size: 11px; color: #aaa; margin-top: 3px; }
    .card-price { font-size: 17px; font-weight: 800; color: #1a1a1a; text-align: right; white-space: nowrap; }
    .card-price-label { font-size: 10px; color: #aaa; text-align: right; margin-top: 2px; }
    
    .fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: #1a1a1a; color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 300; display: flex; align-items: flex-end; justify-content: center; }
    .overlay.hidden { display: none; }
    .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 0 20px 40px; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; position: sticky; top: 0; background: #fff; z-index: 1; }
    .sheet-title { font-size: 17px; font-weight: 700; color: #1a1a1a; }
    .close-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 13px; cursor: pointer; color: #555; }
    
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 5px; }
    input[type="text"], input[type="number"], input[type="date"], select, textarea { 
      width: 100%; padding: 11px 12px; border: 1.5px solid #e8e8e8; border-radius: 10px; 
      font-size: 14px; color: #1a1a1a; background: #fafafa; outline: none; font-family: inherit;
      height: 44px; /* 높이 통일 */
    }
    textarea { height: 80px; }
    .img-preview-container { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; }
    .img-preview { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; background: #eee; border: 1px solid #ddd; }
    
    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn-primary { flex: 1; padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; }
    .btn-danger { padding: 13px 18px; background: #fff; color: #ff4444; border: 1.5px solid #ff4444; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-secondary { padding: 13px 16px; background: #f5f5f7; color: #333; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    
    .detail-img-large { width: 100%; height: 200px; object-fit: cover; border-radius: 14px; margin-bottom: 16px; background: #eee; }
    .toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); padding: 11px 22px; border-radius: 30px; color: #fff; font-size: 13px; font-weight: 600; z-index: 1000; white-space: nowrap; box-shadow: 0 4px 16px rgba(0,0,0,.2); pointer-events: none; }
    .toast.hidden { display: none; }
    .empty { text-align: center; color: #bbb; font-size: 15px; padding: 60px 0; line-height: 2.2; }
    .section-title { font-size: 12px; font-weight: 700; color: #aaa; letter-spacing: .5px; margin-bottom: 10px; margin-top: 10px; }
    .purchase-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; }
    .purchase-amount { font-size: 14px; font-weight: 700; color: #1a1a1a; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">📦</span>
  <span class="header-title">재고관리</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inventory')">재고 목록</button>
  <button class="tab-btn" onclick="switchTab('suppliers')">거래처</button>
</div>

<div class="content" id="tab-inventory">
  <input class="search-input" placeholder="🔍  품목명 또는 메모 검색" oninput="onSearch(this.value)" />
  <div class="sup-scroll" id="sup-scroll"></div>
  <div class="list" id="item-list"></div>
</div>

<div class="content" id="tab-suppliers" style="display:none">
  <div class="list" id="supplier-list"></div>
</div>

<button class="fab" onclick="onFab()">+</button>

<div class="overlay hidden" id="overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" id="sheet"></div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
  let db = JSON.parse(localStorage.getItem('stockdb') || '{"items":[],"suppliers":[]}');
  let currentTab = 'inventory';
  let filterSupplier = '전체';
  let searchQ = '';
  let selectedId = null;
  let tempImg = "";

  function save() { localStorage.setItem('stockdb', JSON.stringify(db)); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function today() { return new Date().toISOString().split('T')[0]; }

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.background = type === 'error' ? '#ff4444' : '#1a1a1a';
    t.classList.remove('hidden');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.add('hidden'), 2200);
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach((b, i) =>
      b.classList.toggle('active', i === (tab === 'inventory' ? 0 : 1))
    );
    document.getElementById('tab-inventory').style.display = tab === 'inventory' ? '' : 'none';
    document.getElementById('tab-suppliers').style.display = tab === 'suppliers' ? '' : 'none';
    render();
  }

  function onSearch(v) { searchQ = v; render(); }
  function onFab() { currentTab === 'inventory' ? openAddItem() : openAddSupplier(); }

  function render() {
    if (currentTab === 'inventory') renderItems();
    else renderSuppliers();
  }

  function renderSupplierFilter() {
    const el = document.getElementById('sup-scroll');
    // 필터칩용 거래처는 가나다순 정렬
    const sortedSups = [...db.suppliers].sort((a,b) => a.name.localeCompare(b.name));
    const chips = [{ id: '전체', name: '전체' }, ...sortedSups];
    el.innerHTML = chips.map(s =>
      `<button class="sup-chip${filterSupplier === s.id ? ' active' : ''}" onclick="setSupFilter('${s.id}')">${s.name}</button>`
    ).join('');
  }

  function setSupFilter(id) { filterSupplier = id; renderItems(); }

  function renderItems() {
    renderSupplierFilter();
    const items = db.items.filter(item => {
      const matchSearch = item.name.includes(searchQ) || (item.note || '').includes(searchQ);
      if (filterSupplier === '전체') return matchSearch;
      return matchSearch && (item.purchases || []).some(p => p.supplierId === filterSupplier);
    });
    const el = document.getElementById('item-list');
    if (!items.length) {
      el.innerHTML = '<div class="empty">아직 품목이 없어요<br><span style="font-size:13px;opacity:.5">아래 + 버튼으로 추가해보세요</span></div>';
      return;
    }
    el.innerHTML = items.map(item => {
      const purchases = item.purchases || [];
      const supNames = [...new Set(purchases.map(p => db.suppliers.find(s => s.id === p.supplierId)?.name).filter(Boolean))];
      const last = purchases.length ? purchases[purchases.length - 1] : null;
      return `
        <div class="card" onclick="openDetail('${item.id}')">
          ${item.img ? `<img src="${item.img}" class="card-img">` : `<div class="card-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;background:#f0f0f0">📦</div>`}
          <div style="flex:1;min-width:0">
            <div class="card-name">${item.name}</div>
            <div class="card-meta">
              ${supNames.map(n => `<span class="badge">${n}</span>`).join('')}
              ${item.note ? '<span class="note-badge">📝 메모</span>' : ''}
            </div>
            ${last ? `<div class="card-sub">최근 매입 ₩${last.amount.toLocaleString()} · ${last.date}</div>` : ''}
          </div>
          <div>
            <div class="card-price">${item.price ? '₩' + Number(item.price).toLocaleString() : '-'}</div>
            <div class="card-price-label">판매가</div>
          </div>
        </div>`;
    }).join('');
  }

  function renderSuppliers() {
    const el = document.getElementById('supplier-list');
    if (!db.suppliers.length) {
      el.innerHTML = '<div class="empty">거래처가 없어요<br><span style="font-size:13px;opacity:.5">+ 버튼으로 추가해보세요</span></div>';
      return;
    }
    // 거래처 목록 가나다순 정렬
    const sortedSups = [...db.suppliers].sort((a,b) => a.name.localeCompare(b.name));
    el.innerHTML = sortedSups.map(s => `
      <div class="card" onclick="openEditSupplier('${s.id}')">
        <div style="flex:1">
          <div class="card-name">${s.name}</div>
          ${s.contact ? `<div class="card-meta"><span class="note-badge">📞 ${s.contact}</span></div>` : ''}
          ${s.note ? `<div class="card-sub" style="white-space:pre-wrap;margin-top:4px">${s.note}</div>` : ''}
        </div>
        <div style="color:#aaa;font-size:20px">›</div>
      </div>`).join('');
  }

  function openModal(html) {
    document.getElementById('sheet').innerHTML = html;
    document.getElementById('overlay').classList.remove('hidden');
  }
  function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
    render();
  }

  function handleImg(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      tempImg = ev.target.result;
      const prev = document.getElementById('img-prev');
      if (prev) prev.src = tempImg;
    };
    reader.readAsDataURL(file);
  }

  function openAddItem() {
    tempImg = "";
    const sortedSups = [...db.suppliers].sort((a,b) => a.name.localeCompare(b.name));
    const supOpts = `<option value="">선택 안 함</option>${sortedSups.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}`;
    openModal(`
      <div class="sheet-header">
        <span class="sheet-title">품목 추가</span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>사진</label>
        <div class="img-preview-container">
          <img id="img-prev" class="img-preview" src="">
          <input type="file" accept="image/*" onchange="handleImg(event)" style="font-size:12px; border:none; background:none;">
        </div>
      </div>
      <div class="form-group"><label>품목명 *</label><input type="text" id="f-name" placeholder="예) 생수 500ml"></div>
      <div class="form-group"><label>매입가 (원) *</label><input type="number" id="f-buyprice" placeholder="0"></div>
      <div class="form-group"><label>날짜</label><input type="date" id="f-buydate" value="${today()}"></div>
      <div class="form-group"><label>거래처</label><select id="f-buysup">${supOpts}</select></div>
      <div class="form-group"><label>판매가 (원)</label><input type="number" id="f-price" placeholder="0"></div>
      <div class="btn-row"><button class="btn-primary" onclick="saveItem('add')">추가</button></div>
    `);
  }

  function openEditItem(id) {
    const item = db.items.find(i => i.id === id);
    if (!item) return;
    selectedId = id;
    tempImg = item.img || "";
    openModal(`
      <div class="sheet-header">
        <span class="sheet-title">품목 수정</span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group">
        <label>사진</label>
        <div class="img-preview-container">
          <img id="img-prev" class="img-preview" src="${tempImg}">
          <input type="file" accept="image/*" onchange="handleImg(event)" style="font-size:12px; border:none; background:none;">
        </div>
      </div>
      <div class="form-group"><label>품목명 *</label><input type="text" id="f-name" value="${item.name}"></div>
      <div class="form-group"><label>판매가 (원)</label><input type="number" id="f-price" value="${item.price || 0}"></div>
      <div class="form-group"><label>메모</label><textarea id="f-note" placeholder="메모를 입력하세요">${item.note || ''}</textarea></div>
      <div class="btn-row">
        <button class="btn-danger" onclick="deleteItem('${id}')">삭제</button>
        <button class="btn-primary" onclick="saveItem('edit')">저장</button>
      </div>
    `);
  }

  function saveItem(mode) {
    const name = document.getElementById('f-name').value.trim();
    if (!name) { showToast('품목명을 입력해주세요', 'error'); return; }
    const price = Number(document.getElementById('f-price').value) || 0;
    const note = document.getElementById('f-note')?.value || '';

    if (mode === 'add') {
      const buyAmount = Number(document.getElementById('f-buyprice').value) || 0;
      if (!buyAmount) { showToast('매입가를 입력해주세요', 'error'); return; }
      const firstPurchase = { id: uid(), date: document.getElementById('f-buydate').value, amount: buyAmount, supplierId: document.getElementById('f-buysup').value, note: '' };
      // unshift를 사용하여 맨 위(앞)로 추가
      db.items.unshift({ id: uid(), name, price, note: '', purchases: [firstPurchase], img: tempImg });
      showToast('품목이 추가됐어요!');
    } else {
      db.items = db.items.map(i => i.id === selectedId ? { ...i, name, price, note, img: tempImg } : i);
      showToast('수정됐어요!');
    }
    save(); closeModal();
  }

  function deleteItem(id) {
    if (!confirm('이 품목을 삭제할까요?')) return;
    db.items = db.items.filter(i => i.id !== id);
    save(); showToast('삭제됐어요', 'error'); closeModal();
  }

  function openDetail(id) {
    const item = db.items.find(i => i.id === id);
    if (!item) return;
    selectedId = id;
    const sortedSups = [...db.suppliers].sort((a,b) => a.name.localeCompare(b.name));
    const supOpts = `<option value="">선택 안 함</option>${sortedSups.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}`;
    const last = item.purchases?.length ? item.purchases[item.purchases.length-1] : null;

    openModal(`
      <div class="sheet-header">
        <span class="sheet-title">${item.name}</span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      ${item.img ? `<img src="${item.img}" class="detail-img-large">` : ''}
      <div class="detail-price-row">
        <div>
          <div class="detail-price-label">판매가</div>
          <div class="detail-price">₩${(item.price||0).toLocaleString()}</div>
        </div>
        <button class="btn-edit-sm" onclick="openEditItem('${item.id}')">수정</button>
      </div>
      ${item.note ? `<div class="note-box">📝 ${item.note}</div>` : ''}
      <div class="section-title">매입 기록 추가</div>
      <div class="purchase-form-card">
        <div class="form-group"><label>날짜</label><input type="date" id="p-date" value="${today()}"></div>
        <div class="form-group"><label>금액 (원)</label><input type="number" id="p-amount" placeholder="0"></div>
        <div class="form-group"><label>거래처</label><select id="p-sup">${supOpts}</select></div>
        <div class="btn-row"><button class="btn-primary" onclick="addPurchase('${item.id}')">매입 추가</button></div>
      </div>
    `);
  }

  function addPurchase(itemId) {
    const amount = Number(document.getElementById('p-amount').value);
    if (!amount) { showToast('금액을 입력해주세요', 'error'); return; }
    const purchase = { id: uid(), date: document.getElementById('p-date').value, amount, supplierId: document.getElementById('p-sup').value, note: '' };
    db.items = db.items.map(i => i.id === itemId ? { ...i, purchases: [...(i.purchases || []), purchase] } : i);
    save(); showToast('매입 추가 완료!'); openDetail(itemId);
  }

  function openAddSupplier() {
    openModal(`
      <div class="sheet-header">
        <span class="sheet-title">거래처 추가</span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group"><label>거래처명 *</label><input type="text" id="s-name" placeholder="예) 한국식품"></div>
      <div class="form-group"><label>연락처</label><input type="text" id="s-contact" placeholder="010-0000-0000"></div>
      <div class="form-group"><label>메모</label><textarea id="s-note"></textarea></div>
      <div class="btn-row"><button class="btn-primary" onclick="saveSupplier('add')">추가</button></div>
    `);
  }

  function openEditSupplier(id) {
    const s = db.suppliers.find(x => x.id === id);
    selectedId = id;
    openModal(`
      <div class="sheet-header">
        <span class="sheet-title">거래처 수정</span>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="form-group"><label>거래처명 *</label><input type="text" id="s-name" value="${s.name}"></div>
      <div class="form-group"><label>연락처</label><input type="text" id="s-contact" value="${s.contact || ''}"></div>
      <div class="form-group"><label>메모</label><textarea id="s-note">${s.note || ''}</textarea></div>
      <div class="btn-row">
        <button class="btn-danger" onclick="deleteSupplier('${id}')">삭제</button>
        <button class="btn-primary" onclick="saveSupplier('edit')">저장</button>
      </div>
    `);
  }

  function saveSupplier(mode) {
    const name = document.getElementById('s-name').value.trim();
    if (!name) return showToast('이름을 입력하세요', 'error');
    const contact = document.getElementById('s-contact').value;
    const note = document.getElementById('s-note').value;
    if (mode === 'add') db.suppliers.push({ id: uid(), name, contact, note });
    else db.suppliers = db.suppliers.map(s => s.id === selectedId ? { ...s, name, contact, note } : s);
    save(); closeModal();
  }

  function deleteSupplier(id) {
    if (!confirm('삭제하시겠습니까?')) return;
    db.suppliers = db.suppliers.filter(s => s.id !== id);
    save(); closeModal();
  }

  render();
</script>

</body>
</html>
