<script>
var db             = JSON.parse(localStorage.getItem("stockdb") || '{"items":[],"suppliers":[]}');
var currentTab     = "inventory";
var filterSupplier = "전체";
var searchQ        = "";
var modalMode      = null;
var selectedId     = null;

/* ── Helpers ── */
function save() {
  try { localStorage.setItem("stockdb", JSON.stringify(db)); }
  catch(e) { showToast("저장 공간 부족. 사진을 줄여보세요", "error"); }
}
function uid()   { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().split("T")[0]; }
function esc(s)  { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function sortedSuppliers() { return db.suppliers.slice().sort(function(a,b){ return a.name.localeCompare(b.name,"ko"); }); }
function supOptionsHtml(selId) {
  var html = "<option value=\"\">선택 안 함</option>";
  sortedSuppliers().forEach(function(s) {
    html += "<option value=\"" + s.id + "\"" + (s.id === selId ? " selected" : "") + ">" + esc(s.name) + "</option>";
  });
  return html;
}
function getVal(id) { var el = document.getElementById(id); return el ? el.value : ""; }
function getNum(id) { return Number(getVal(id)) || 0; }
function showToast(msg, type) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background = type === "error" ? "#ff4444" : "#1a1a1a";
  t.classList.remove("hidden");
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.classList.add("hidden"); }, 2200);
}
function marginHtml(sell, buy) {
  if (!sell || !buy) return "";
  var pct = ((sell - buy) / buy * 100).toFixed(1);
  var cls = Number(pct) >= 0 ? "margin-pos" : "margin-neg";
  return "<span class=\"margin-tag " + cls + "\">" + pct + "%</span>";
}

/* ── Init events ── */
document.getElementById("tab-btn-inventory").addEventListener("click", function(){ switchTab("inventory"); });
document.getElementById("tab-btn-suppliers").addEventListener("click", function(){ switchTab("suppliers"); });
document.getElementById("tab-btn-backup").addEventListener("click",    function(){ switchTab("backup"); });
document.getElementById("fab-btn").addEventListener("click",           function(){ onFab(); });
document.getElementById("search-input").addEventListener("input",      function(){ searchQ = this.value; renderItems(); });
document.getElementById("overlay").addEventListener("click",           function(e){ if(e.target === this) closeModal(); });
document.getElementById("btn-export").addEventListener("click",        exportData);
document.getElementById("btn-import").addEventListener("click",        function(){ document.getElementById("import-input").click(); });
document.getElementById("import-input").addEventListener("change",     function(){ importData(this); });

/* ── Tabs ── */
function switchTab(tab) {
  currentTab = tab;
  ["inventory","suppliers","backup"].forEach(function(t) {
    document.getElementById("tab-btn-" + t).classList.toggle("active", t === tab);
    document.getElementById("tab-" + t).style.display = t === tab ? "" : "none";
  });
  render();
}
function onFab() { currentTab === "inventory" ? openAddItem() : openAddSupplier(); }
function render() {
  if      (currentTab === "inventory") renderItems();
  else if (currentTab === "suppliers") renderSuppliers();
  else if (currentTab === "backup")    renderBackupStats();
}

/* ── Render Items ── */
function renderSupplierFilter() {
  var chips = [{ id:"전체", name:"전체" }].concat(sortedSuppliers());
  var html  = "";
  chips.forEach(function(s) {
    html += "<button class=\"sup-chip" + (filterSupplier === s.id ? " active" : "") + "\" data-supid=\"" + s.id + "\">" + esc(s.name) + "</button>";
  });
  var el = document.getElementById("sup-scroll");
  el.innerHTML = html;
  el.querySelectorAll(".sup-chip").forEach(function(btn) {
    btn.addEventListener("click", function() { filterSupplier = this.dataset.supid; renderItems(); });
  });
}
function renderItems() {
  renderSupplierFilter();
  var items = db.items.filter(function(item) {
    var ms = item.name.indexOf(searchQ) !== -1 || (item.note || "").indexOf(searchQ) !== -1;
    if (filterSupplier === "전체") return ms;
    return ms && (item.purchases || []).some(function(p){ return p.supplierId === filterSupplier; });
  });
  var el = document.getElementById("item-list");
  if (!items.length) {
    el.innerHTML = "<div class=\"empty\">아직 품목이 없어요<br><span style=\"font-size:13px;opacity:.5\">아래 + 버튼으로 추가해보세요</span></div>";
    return;
  }
  var html = "";
  items.forEach(function(item) {
    var purchases = item.purchases || [];
    var last      = purchases[purchases.length - 1];
    var supSet = {}, supNames = [];
    purchases.forEach(function(p) {
      var sup = db.suppliers.find(function(s){ return s.id === p.supplierId; });
      if (sup && !supSet[sup.name]) { supSet[sup.name] = 1; supNames.push(sup.name); }
    });
    var badges    = supNames.map(function(n){ return "<span class=\"badge\">" + esc(n) + "</span>"; }).join("");
    var lastLine  = last ? "<div class=\"card-sub\">최근 매입 &#8361;" + last.amount.toLocaleString() + " &middot; " + last.date + "</div>" : "";
    var thumb     = item.photo ? "<img class=\"card-thumb\" src=\"" + item.photo + "\">" : "";
    var priceStr  = item.price ? "&#8361;" + Number(item.price).toLocaleString() : "-";
    html += "<div class=\"card\" data-itemid=\"" + item.id + "\">" + thumb;
    html += "<div style=\"flex:1;min-width:0\"><div class=\"card-name\">" + esc(item.name) + "</div>";
    html += "<div class=\"card-meta\">" + badges + "</div>" + lastLine + "</div>";
    html += "<div style=\"flex-shrink:0;text-align:right\"><div class=\"card-price\">" + priceStr + "</div><div class=\"card-price-label\">판매가</div></div></div>";
  });
  el.innerHTML = html;
  el.querySelectorAll(".card").forEach(function(card) {
    card.addEventListener("click", function() { openDetail(this.dataset.itemid); });
  });
}

/* ── Render Suppliers ── */
function renderSuppliers() {
  var el = document.getElementById("supplier-list");
  if (!db.suppliers.length) {
    el.innerHTML = "<div class=\"empty\">거래처가 없어요<br><span style=\"font-size:13px;opacity:.5\">+ 버튼으로 추가해보세요</span></div>";
    return;
  }
  var html = "";
  sortedSuppliers().forEach(function(s) {
    html += "<div class=\"card\" data-supid=\"" + s.id + "\"><div style=\"flex:1\">";
    html += "<div class=\"card-name\">" + esc(s.name) + "</div>";
    if (s.contact) html += "<div class=\"card-meta\"><span class=\"note-badge\">&#128222; " + esc(s.contact) + "</span></div>";
    if (s.note)    html += "<div class=\"card-sub\" style=\"white-space:pre-wrap;margin-top:4px\">" + esc(s.note) + "</div>";
    html += "</div><div style=\"color:#aaa;font-size:20px\">&rsaquo;</div></div>";
  });
  el.innerHTML = html;
  el.querySelectorAll(".card").forEach(function(card) {
    card.addEventListener("click", function() { openEditSupplier(this.dataset.supid); });
  });
}

/* ── Modal ── */
function openModal(html) {
  document.getElementById("sheet").innerHTML = html;
  document.getElementById("overlay").classList.remove("hidden");
  var closeBtn = document.getElementById("modal-close");
  if (closeBtn) closeBtn.addEventListener("click", closeModal);
}
function closeModal() {
  document.getElementById("overlay").classList.add("hidden");
  render();
}

/* ── Photo ── */
function resizeAndSave(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var MAX = 400, w = img.width, h = img.height;
      if (w > h) { if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; } }
      else        { if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; } }
      var canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL("image/jpeg", 0.7));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ── 거래처 자동완성 ── */
function bindAutocomplete(inputId, hiddenId) {
  var input  = document.getElementById(inputId);
  var hidden = document.getElementById(hiddenId);
  var list   = document.getElementById(inputId + "-list");
  if (!input || !list) return;

  function showList(q) {
    var filtered = sortedSuppliers().filter(function(s){ return s.name.indexOf(q) !== -1; });
    if (!filtered.length || !q) { list.style.display = "none"; return; }
    var html = "";
    filtered.forEach(function(s) {
      html += "<div class=\"autocomplete-item\" data-id=\"" + s.id + "\" data-name=\"" + esc(s.name) + "\">" + esc(s.name) + "</div>";
    });
    list.innerHTML = html;
    list.style.display = "block";
    list.querySelectorAll(".autocomplete-item").forEach(function(item) {
      item.addEventListener("click", function() {
        input.value  = this.dataset.name;
        hidden.value = this.dataset.id;
        list.style.display = "none";
      });
    });
  }

  input.addEventListener("input", function() {
    hidden.value = "";
    showList(this.value);
  });
  input.addEventListener("blur", function() {
    setTimeout(function(){ list.style.display = "none"; }, 150);
  });
}

/* ── Item Add ── */
function openAddItem() {
  modalMode = "add_item";
  var html = "";
  html += "<div class=\"sheet-header\"><span class=\"sheet-title\">품목 추가</span><button class=\"close-btn\" id=\"modal-close\">&#10005;</button></div>";
  html += "<div class=\"form-group\"><label>품목명 *</label><input type=\"text\" id=\"f-name\" placeholder=\"예) 생수 500ml\"></div>";
  html += "<div class=\"form-group\"><label>사진</label>";
  html += "<div class=\"photo-upload-area\" id=\"photo-upload-area\"><span style=\"font-size:24px\">&#128247;</span><span>탭하여 사진 추가</span></div>";
  html += "<input type=\"file\" id=\"photo-input\" accept=\"image/*\" style=\"display:none\">";
  html += "<img id=\"photo-preview-img\" class=\"photo-preview-img\" style=\"display:none\">";
  html += "<button id=\"photo-remove-btn\" class=\"photo-remove-btn\" style=\"display:none\">사진 삭제</button></div>";
  html += "<div class=\"form-group\"><label>매입가 (원)</label><input type=\"number\" id=\"f-buyprice\" placeholder=\"0\"></div>";
  html += "<div class=\"form-group\"><label>날짜</label><input type=\"date\" id=\"f-buydate\" value=\"" + today() + "\"></div>";
  html += "<div class=\"form-group\"><label>거래처</label>";
  html += "<div class=\"autocomplete-wrap\">";
  html += "<input type=\"text\" id=\"f-buysup-text\" placeholder=\"거래처 검색 또는 입력\">";
  html += "<input type=\"hidden\" id=\"f-buysup\">";
  html += "<div class=\"autocomplete-list\" id=\"f-buysup-text-list\" style=\"display:none\"></div>";
  html += "</div></div>";
  html += "<div class=\"form-group\"><label>판매가 (원)</label><input type=\"number\" id=\"f-price\" placeholder=\"0\"></div>";
  html += "<div id=\"margin-hint\" style=\"font-size:12px;margin-top:-8px;margin-bottom:14px;padding-left:4px;min-height:18px\"></div>";
  html += "<div class=\"btn-row\"><button class=\"btn-primary\" id=\"btn-save-item\">추가</button></div>";
  openModal(html);

  // photo
  document.getElementById("photo-upload-area").addEventListener("click", function(){ document.getElementById("photo-input").click(); });
  document.getElementById("photo-preview-img").addEventListener("click", function(){ document.getElementById("photo-input").click(); });
  document.getElementById("photo-remove-btn").addEventListener("click", function() {
    document.getElementById("photo-input").value = "";
    document.getElementById("photo-preview-img").style.display = "none";
    document.getElementById("photo-upload-area").style.display = "flex";
    this.style.display = "none";
  });
  document.getElementById("photo-input").addEventListener("change", function() {
    if (!this.files[0]) return;
    resizeAndSave(this.files[0], function(src) {
      document.getElementById("photo-preview-img").src = src;
      document.getElementById("photo-preview-img").style.display = "block";
      document.getElementById("photo-upload-area").style.display = "none";
      document.getElementById("photo-remove-btn").style.display = "inline-block";
    });
  });

  // margin hint
  function calcHint() {
    var buy = getNum("f-buyprice"), sell = getNum("f-price");
    var el  = document.getElementById("margin-hint");
    if (!el) return;
    if (buy > 0 && sell > 0) {
      var pct = ((sell - buy) / buy * 100).toFixed(1);
      el.textContent = "마진 " + pct + "%";
      el.style.color = Number(pct) >= 0 ? "#4caf50" : "#ff4444";
    } else { el.textContent = ""; }
  }
  document.getElementById("f-buyprice").addEventListener("input", calcHint);
  document.getElementById("f-price").addEventListener("input", calcHint);
  document.getElementById("btn-save-item").addEventListener("click", saveItem);
  bindAutocomplete("f-buysup-text", "f-buysup");
}

/* ── Item Edit ── */
function openEditItem(id) {
  var item = db.items.find(function(i){ return i.id === id; });
  if (!item) return;
  selectedId = id; modalMode = "edit_item";

  var purchases = item.purchases || [];
  var latestBuy = purchases.length ? purchases[purchases.length - 1].amount : 0;
  var mHtml     = marginHtml(item.price, latestBuy);

  var photoHtml = "";
  if (item.photo) {
    photoHtml += "<img class=\"photo-preview-img\" id=\"photo-preview-img\" src=\"" + item.photo + "\">";
    photoHtml += "<button class=\"photo-remove-btn\" id=\"photo-remove-btn\">사진 삭제</button>";
    photoHtml += "<input type=\"file\" id=\"photo-input\" accept=\"image/*\" style=\"display:none\">";
  } else {
    photoHtml += "<div class=\"photo-upload-area\" id=\"photo-upload-area\"><span style=\"font-size:24px\">&#128247;</span><span>탭하여 사진 추가</span></div>";
    photoHtml += "<input type=\"file\" id=\"photo-input\" accept=\"image/*\" style=\"display:none\">";
    photoHtml += "<img id=\"photo-preview-img\" class=\"photo-preview-img\" style=\"display:none\">";
    photoHtml += "<button id=\"photo-remove-btn\" class=\"photo-remove-btn\" style=\"display:none\">사진 삭제</button>";
  }

  var html = "";
  html += "<div class=\"sheet-header\"><span class=\"sheet-title\">품목 수정</span><button class=\"close-btn\" id=\"modal-close\">&#10005;</button></div>";
  html += photoHtml;
  html += "<div class=\"form-group\"><label>품목명 *</label><input type=\"text\" id=\"f-name\" value=\"" + esc(item.name) + "\"></div>";
  html += "<div class=\"form-group\"><label>판매가 (원)</label><input type=\"number\" id=\"f-price\" value=\"" + (item.price || 0) + "\"></div>";
  html += "<div id=\"margin-hint\" style=\"font-size:12px;margin-top:-8px;margin-bottom:14px;padding-left:4px;min-height:18px\">" + (latestBuy && item.price ? "마진 " + ((item.price-latestBuy)/latestBuy*100).toFixed(1) + "%" : "") + "</div>";
  html += "<div class=\"btn-row\"><button class=\"btn-danger\" id=\"btn-delete-item\">삭제</button><button class=\"btn-primary\" id=\"btn-save-item\">저장</button></div>";
  openModal(html);

  // margin hint
  document.getElementById("f-price").addEventListener("input", function() {
    var sell = Number(this.value) || 0;
    var el   = document.getElementById("margin-hint");
    if (!el || !latestBuy) return;
    if (sell > 0) {
      var pct = ((sell - latestBuy) / latestBuy * 100).toFixed(1);
      el.textContent = "마진 " + pct + "%";
      el.style.color = Number(pct) >= 0 ? "#4caf50" : "#ff4444";
    } else { el.textContent = ""; }
  });

  // photo events
  var phInp = document.getElementById("photo-input");
  var upArea = document.getElementById("photo-upload-area");
  var preImg = document.getElementById("photo-preview-img");
  var rmBtn  = document.getElementById("photo-remove-btn");
  if (upArea) upArea.addEventListener("click", function(){ phInp.click(); });
  if (preImg) preImg.addEventListener("click", function(){ phInp.click(); });
  if (rmBtn) rmBtn.addEventListener("click", function() {
    db.items = db.items.map(function(i){ return i.id === id ? Object.assign({}, i, { photo:"" }) : i; });
    save(); openEditItem(id);
  });
  phInp.addEventListener("change", function() {
    if (!this.files[0]) return;
    resizeAndSave(this.files[0], function(src) {
      db.items = db.items.map(function(i){ return i.id === id ? Object.assign({}, i, { photo:src }) : i; });
      save(); showToast("사진 저장됐어요!"); openEditItem(id);
    });
  });

  document.getElementById("btn-save-item").addEventListener("click", saveItem);
  document.getElementById("btn-delete-item").addEventListener("click", function(){ deleteItem(id); });
}

/* ── Item Save / Delete ── */
function saveItem() {
  var name = getVal("f-name").trim();
  if (!name) { showToast("품목명을 입력해주세요", "error"); return; }

  if (modalMode === "add_item") {
    var buyAmount = getNum("f-buyprice");
    var price     = getNum("f-price");
    var pre       = document.getElementById("photo-preview-img");
    var photo     = (pre && pre.style.display !== "none") ? pre.src : "";
    var supId     = getVal("f-buysup");
    var supText   = getVal("f-buysup-text").trim();
    // 직접 입력한 경우 새 거래처 생성
    if (!supId && supText) {
      var exists = db.suppliers.find(function(s){ return s.name === supText; });
      if (exists) { supId = exists.id; }
      else {
        var newSup = { id:uid(), name:supText, contact:"", note:"" };
        db.suppliers.push(newSup);
        supId = newSup.id;
      }
    }
    var purchases = [];
    if (buyAmount) {
      purchases.push({ id:uid(), date:getVal("f-buydate"), amount:buyAmount, supplierId:supId, note:"" });
    }
    db.items.unshift({ id:uid(), name:name, price:price, note:"", photo:photo, purchases:purchases, sales:[] });
    showToast("품목이 추가됐어요!");
    save(); closeModal();
    window.scrollTo({ top:0, behavior:"smooth" });
  } else {
    var price2 = getNum("f-price");
    db.items = db.items.map(function(i) {
      return i.id === selectedId ? Object.assign({}, i, { name:name, price:price2 }) : i;
    });
    showToast("수정됐어요!"); save(); closeModal();
  }
}
function deleteItem(id) {
  if (!confirm("이 품목을 삭제할까요?")) return;
  db.items = db.items.filter(function(i){ return i.id !== id; });
  save(); showToast("삭제됐어요", "error"); closeModal();
}

/* ── Detail (스와이프 탭) ── */
function openDetail(id) { selectedId = id; renderDetail("buy"); }

function renderDetail(activePanel) {
  var item = db.items.find(function(i){ return i.id === selectedId; });
  if (!item) return;

  var purchases = item.purchases || [];
  var sales     = item.sales || [];
  var last      = purchases[purchases.length - 1];
  var mHtml     = last ? marginHtml(item.price, last.amount) : "";
  var priceStr  = item.price ? "&#8361;" + Number(item.price).toLocaleString() : "-";

  // 매입 내역
  var buyHistory = "";
  if (purchases.length) {
    purchases.forEach(function(p) {
      var sup   = db.suppliers.find(function(s){ return s.id === p.supplierId; });
      var sname = sup ? sup.name : "";
      var meta  = [sname, p.note].filter(Boolean).join(" · ");
      var opts  = supOptionsHtml(p.supplierId);
      buyHistory += "<div class=\"record-item\" data-pid=\"" + p.id + "\">";
      buyHistory += "<div class=\"record-left\"><div class=\"record-date\">" + p.date + "</div>";
      buyHistory += "<div class=\"record-meta\">" + esc(meta || "거래처 없음 — 탭하여 추가") + "</div></div>";
      buyHistory += "<div class=\"record-right\"><span class=\"record-amount\">&#8361;" + p.amount.toLocaleString() + "</span>";
      buyHistory += "<button class=\"btn-del\" data-pid=\"" + p.id + "\">삭제</button></div></div>";
      buyHistory += "<div class=\"edit-inline\" id=\"edit-" + p.id + "\" style=\"display:none\">";
      buyHistory += "<div class=\"form-group\"><label>거래처</label><select id=\"ed-sup-" + p.id + "\">" + opts + "</select></div>";
      buyHistory += "<div class=\"form-group\"><label>메모</label><input type=\"text\" id=\"ed-note-" + p.id + "\" value=\"" + esc(p.note||"") + "\" placeholder=\"선택 사항\"></div>";
      buyHistory += "<div style=\"display:flex;gap:8px\"><button class=\"btn-secondary\" data-pid=\"" + p.id + "\" id=\"btn-cancel-" + p.id + "\">취소</button>";
      buyHistory += "<button class=\"btn-primary\" id=\"btn-save-p-" + p.id + "\">저장</button></div></div>";
    });
  } else { buyHistory = "<div style=\"text-align:center;color:#ccc;padding:20px 0;font-size:13px\">매입 기록이 없어요</div>"; }

  // 판매 내역
  var saleHistory = "";
  if (sales.length) {
    sales.forEach(function(s) {
      saleHistory += "<div class=\"record-item\" style=\"cursor:default\">";
      saleHistory += "<div class=\"record-left\"><div class=\"record-date\">" + s.date + "</div>";
      if (s.note) saleHistory += "<div class=\"record-meta\">" + esc(s.note) + "</div>";
      saleHistory += "</div><div class=\"record-right\"><span class=\"record-amount\">&#8361;" + s.amount.toLocaleString() + "</span>";
      saleHistory += "<button class=\"btn-del\" data-saleid=\"" + s.id + "\">삭제</button></div></div>";
    });
  } else { saleHistory = "<div style=\"text-align:center;color:#ccc;padding:20px 0;font-size:13px\">판매 기록이 없어요</div>"; }

  var buyActive  = activePanel === "buy"  ? " active" : "";
  var saleActive = activePanel === "sale" ? " active" : "";

  var html = "";
  html += "<div class=\"sheet-header\"><span class=\"sheet-title\">" + esc(item.name) + "</span><button class=\"close-btn\" id=\"modal-close\">&#10005;</button></div>";
  if (item.photo) html += "<img src=\"" + item.photo + "\" style=\"width:100%;height:180px;object-fit:cover;border-radius:14px;margin-bottom:14px\">";
  html += "<div class=\"detail-price-row\">";
  html += "<div><div class=\"detail-price-label\">판매가</div><div class=\"detail-price\">" + priceStr + " " + mHtml + "</div></div>";
  html += "<button class=\"btn-edit-sm\" id=\"btn-open-edit\">수정</button></div>";
  if (item.note) html += "<div class=\"note-box\">&#128221; " + esc(item.note) + "</div>";

  // 슬라이드 탭
  html += "<div class=\"slide-tabs\"><button class=\"slide-tab-btn" + buyActive + "\" id=\"slide-buy\">매입 기록</button><button class=\"slide-tab-btn" + saleActive + "\" id=\"slide-sale\">판매 기록</button></div>";

  // 매입 패널
  html += "<div class=\"slide-panel" + buyActive + "\" id=\"panel-buy\">";
  html += "<div class=\"form-card\">";
  html += "<div class=\"form-group\"><label>날짜</label><input type=\"date\" id=\"p-date\" value=\"" + today() + "\"></div>";
  html += "<div class=\"form-group\"><label>금액 (원)</label><input type=\"number\" id=\"p-amount\" placeholder=\"0\"></div>";
  html += "<div class=\"form-group\"><label>거래처</label><select id=\"p-sup\">" + supOptionsHtml("") + "</select></div>";
  html += "<div class=\"form-group\"><label>메모</label><input type=\"text\" id=\"p-note\" placeholder=\"선택 사항\"></div>";
  html += "<div class=\"form-card-actions\"><button class=\"btn-secondary\" id=\"btn-p-reset\">초기화</button><button class=\"btn-primary\" id=\"btn-p-add\">완료</button></div>";
  html += "</div>" + buyHistory + "</div>";

  // 판매 패널
  html += "<div class=\"slide-panel" + saleActive + "\" id=\"panel-sale\">";
  html += "<div class=\"form-card\">";
  html += "<div class=\"form-group\"><label>날짜</label><input type=\"date\" id=\"s-date\" value=\"" + today() + "\"></div>";
  html += "<div class=\"form-group\"><label>금액 (원)</label><input type=\"number\" id=\"s-amount\" placeholder=\"0\"></div>";
  html += "<div class=\"form-group\"><label>메모</label><input type=\"text\" id=\"s-note\" placeholder=\"선택 사항\"></div>";
  html += "<div class=\"form-card-actions\"><button class=\"btn-secondary\" id=\"btn-s-reset\">초기화</button><button class=\"btn-primary\" id=\"btn-s-add\">완료</button></div>";
  html += "</div>" + saleHistory + "</div>";

  openModal(html);

  // 슬라이드 탭 전환
  document.getElementById("slide-buy").addEventListener("click", function() { renderDetail("buy"); });
  document.getElementById("slide-sale").addEventListener("click", function() { renderDetail("sale"); });

  document.getElementById("btn-open-edit").addEventListener("click", function(){ openEditItem(item.id); });

  // 매입 추가
  document.getElementById("btn-p-reset").addEventListener("click", function() {
    document.getElementById("p-date").value = today();
    document.getElementById("p-amount").value = "";
    document.getElementById("p-sup").value = "";
    document.getElementById("p-note").value = "";
  });
  document.getElementById("btn-p-add").addEventListener("click", function(){ addPurchase(item.id); });

  // 판매 추가
  document.getElementById("btn-s-reset").addEventListener("click", function() {
    document.getElementById("s-date").value = today();
    document.getElementById("s-amount").value = "";
    document.getElementById("s-note").value = "";
  });
  document.getElementById("btn-s-add").addEventListener("click", function(){ addSale(item.id); });

  // 매입 inline edit
  purchases.forEach(function(p) {
    var row     = document.querySelector(".record-item[data-pid=\"" + p.id + "\"]");
    var saveBtn = document.getElementById("btn-save-p-" + p.id);
    var cancBtn = document.getElementById("btn-cancel-" + p.id);
    if (row) row.addEventListener("click", function(e) {
      if (e.target.classList.contains("btn-del")) return;
      var el = document.getElementById("edit-" + p.id);
      if (el) el.style.display = el.style.display === "none" ? "block" : "none";
    });
    if (saveBtn) saveBtn.addEventListener("click", function(){ savePurchaseEdit(p.id); });
    if (cancBtn) cancBtn.addEventListener("click", function() {
      var el = document.getElementById("edit-" + p.id);
      if (el) el.style.display = "none";
    });
  });

  // 매입 삭제
  document.querySelectorAll(".btn-del[data-pid]").forEach(function(btn) {
    btn.addEventListener("click", function(e) { e.stopPropagation(); deletePurchase(this.dataset.pid); });
  });
  // 판매 삭제
  document.querySelectorAll(".btn-del[data-saleid]").forEach(function(btn) {
    btn.addEventListener("click", function() { deleteSale(item.id, this.dataset.saleid); });
  });
}

function addPurchase(itemId) {
  var amount = getNum("p-amount");
  if (!amount) { showToast("금액을 입력해주세요", "error"); return; }
  var purchase = { id:uid(), date:getVal("p-date"), amount:amount, supplierId:getVal("p-sup"), note:getVal("p-note") };
  db.items = db.items.map(function(i) {
    return i.id === itemId ? Object.assign({}, i, { purchases:(i.purchases||[]).concat([purchase]) }) : i;
  });
  save(); showToast("매입 기록 추가!"); renderDetail("buy");
}
function savePurchaseEdit(pid) {
  var supplierId = getVal("ed-sup-" + pid);
  var note       = getVal("ed-note-" + pid);
  db.items = db.items.map(function(i) {
    return Object.assign({}, i, { purchases:(i.purchases||[]).map(function(p) {
      return p.id === pid ? Object.assign({}, p, { supplierId:supplierId, note:note }) : p;
    })});
  });
  save(); showToast("수정됐어요!"); renderDetail("buy");
}
function deletePurchase(pid) {
  if (!confirm("이 매입 기록을 삭제할까요?")) return;
  db.items = db.items.map(function(i) {
    return Object.assign({}, i, { purchases:(i.purchases||[]).filter(function(p){ return p.id !== pid; }) });
  });
  save(); showToast("삭제됐어요", "error"); renderDetail("buy");
}
function addSale(itemId) {
  var amount = getNum("s-amount");
  if (!amount) { showToast("금액을 입력해주세요", "error"); return; }
  var sale = { id:uid(), date:getVal("s-date"), amount:amount, note:getVal("s-note") };
  db.items = db.items.map(function(i) {
    return i.id === itemId ? Object.assign({}, i, { sales:(i.sales||[]).concat([sale]) }) : i;
  });
  save(); showToast("판매 기록 추가!"); renderDetail("sale");
}
function deleteSale(itemId, saleId) {
  if (!confirm("이 판매 기록을 삭제할까요?")) return;
  db.items = db.items.map(function(i) {
    return i.id === itemId ? Object.assign({}, i, { sales:(i.sales||[]).filter(function(s){ return s.id !== saleId; }) }) : i;
  });
  save(); showToast("삭제됐어요", "error"); renderDetail("sale");
}

/* ── Supplier ── */

  modalMode = "add_sup";
  var html = "";
  html += "<div class=\"sheet-header\"><span class=\"sheet-title\">거래처 추가</span><button class=\"close-btn\" id=\"modal-close\">&#10005;</button></div>";
  html += "<div class=\"form-group\"><label>거래처명 *</label><input type=\"text\" id=\"f-name\" placeholder=\"예) 한국식품\"></div>";
  html += "<div class=\"form-group\"><label>연락처</label><input type=\"text\" id=\"f-contact\" placeholder=\"010-0000-0000\"></div>";
  html += "<div class=\"form-group\"><label>메모</label><textarea id=\"f-note\" placeholder=\"주소, 담당자 등...\"></textarea></div>";

html += “<div class="btn-row"><button class="btn-primary" id="btn-save-sup">추가</button></div>”;
openModal(html);
document.getElementById(“btn-save-sup”).addEventListener(“click”, saveSupplier);
}
function openEditSupplier(id) {
var s = db.suppliers.find(function(x){ return x.id === id; });
if (!s) return;
selectedId = id; modalMode = “edit_sup”;
var html = “”;
html += “<div class="sheet-header"><span class="sheet-title">거래처 수정</span><button class="close-btn" id="modal-close">✕</button></div>”;
html += “<div class="form-group"><label>거래처명 *</label><input type="text" id="f-name" value="” + esc(s.name) + “"></div>”;
html += “<div class="form-group"><label>연락처</label><input type="text" id="f-contact" value="” + esc(s.contact||””) + “"></div>”;
html += “<div class="form-group"><label>메모</label><textarea id="f-note">” + esc(s.note||””) + “</textarea></div>”;
html += “<div class="btn-row"><button class="btn-danger" id="btn-del-sup">삭제</button><button class="btn-primary" id="btn-save-sup">저장</button></div>”;
openModal(html);
document.getElementById(“btn-save-sup”).addEventListener(“click”, saveSupplier);
document.getElementById(“btn-del-sup”).addEventListener(“click”, function(){ deleteSupplier(id); });
}
function saveSupplier() {
var name = getVal(“f-name”).trim();
if (!name) { showToast(“거래처명을 입력해주세요”, “error”); return; }
var contact = getVal(“f-contact”), note = getVal(“f-note”);
if (modalMode === “add_sup”) {
db.suppliers.push({ id:uid(), name:name, contact:contact, note:note });
showToast(“거래처 추가!”);
} else {
db.suppliers = db.suppliers.map(function(s) {
return s.id === selectedId ? Object.assign({}, s, { name:name, contact:contact, note:note }) : s;
});
showToast(“수정됐어요!”);
}
save(); closeModal();
}
function deleteSupplier(id) {
if (!confirm(“이 거래처를 삭제할까요?”)) return;
db.suppliers = db.suppliers.filter(function(s){ return s.id !== id; });
save(); showToast(“삭제됐어요”, “error”); closeModal();
}

/* ── Backup ── */
function renderBackupStats() {
var el = document.getElementById(“backup-stats”);
if (!el) return;
var tp = db.items.reduce(function(s,i){ return s+(i.purchases||[]).length; },0);
var ts = db.items.reduce(function(s,i){ return s+(i.sales||[]).length; },0);
var sz = (new Blob([JSON.stringify(db)]).size/1024).toFixed(1);
el.innerHTML = “품목 수: <b>” + db.items.length + “개</b><br>거래처 수: <b>” + db.suppliers.length + “개</b><br>매입 기록: <b>” + tp + “건</b><br>판매 기록: <b>” + ts + “건</b><br>데이터 크기: <b>” + sz + “ KB</b>”;
}
function exportData() {
var blob = new Blob([JSON.stringify(db,null,2)], { type:“application/json” });
var url  = URL.createObjectURL(blob);
var a    = document.createElement(“a”);
a.href   = url; a.download = “재고관리_백업_” + new Date().toISOString().slice(0,10) + “.json”;
a.click(); URL.revokeObjectURL(url);
showToast(“내보내기 완료!”);
}
function importData(input) {
var file = input.files[0]; if (!file) return;
if (!confirm(“현재 데이터를 덮어씌웁니다. 계속할까요?”)) { input.value=””; return; }
var reader = new FileReader();
reader.onload = function(e) {
try {
var p = JSON.parse(e.target.result);
if (!p.items || !p.suppliers) throw new Error();
db = p; save(); showToast(“가져오기 완료!”); renderBackupStats();
} catch(err) { showToast(“올바른 백업 파일이 아니에요”, “error”); }
input.value = “”;
};
reader.readAsText(file);
}

render();
</script>
