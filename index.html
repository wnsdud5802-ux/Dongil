<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="재고관리"/>
  <title>재고관리</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f7; min-height: 100vh; max-width: 430px; margin: 0 auto; }
    .header { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; padding: 14px 20px; display: flex; align-items: center; gap: 8px; }
    .header-title { font-size: 18px; font-weight: 700; color: #1a1a1a; }
    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 16px; }
    .tab-btn { flex: 1; padding: 11px 0; border: none; background: none; font-size: 14px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2.5px solid transparent; font-family: inherit; }
    .tab-btn.active { color: #1a1a1a; font-weight: 700; border-bottom-color: #1a1a1a; }
    .content { padding: 16px; padding-bottom: 100px; }
    .search-input { width: 100%; padding: 10px 14px; border-radius: 12px; border: 1.5px solid #e8e8e8; font-size: 14px; background: #fff; outline: none; color: #1a1a1a; font-family: inherit; margin-bottom: 10px; }
    .sup-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
    .sup-scroll::-webkit-scrollbar { display: none; }
    .sup-chip { flex-shrink: 0; padding: 6px 13px; border-radius: 20px; border: 1.5px solid #e0e0e0; background: #fff; font-size: 12px; font-weight: 500; color: #666; cursor: pointer; white-space: nowrap; font-family: inherit; }
    .sup-chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .list { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .card { background: #fff; border-radius: 14px; padding: 14px 16px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06); gap: 12px; }
    .card-name { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 2px; }
    .badge { font-size: 11px; font-weight: 600; background: #f0f0f0; color: #555; padding: 2px 8px; border-radius: 8px; }
    .note-badge { font-size: 11px; color: #888; padding: 2px 6px; background: #fff8e1; border-radius: 8px; }
    .card-sub { font-size: 11px; color: #aaa; margin-top: 3px; }
    .card-price { font-size: 17px; font-weight: 800; color: #1a1a1a; text-align: right; white-space: nowrap; }
    .card-price-label { font-size: 10px; color: #aaa; text-align: right; margin-top: 2px; }
    .card-thumb { width: 52px; height: 52px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }
    .empty { text-align: center; color: #bbb; font-size: 15px; padding: 60px 0; line-height: 2.2; }
    .fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: #1a1a1a; color: #fff; font-size: 28px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 300; display: flex; align-items: flex-end; justify-content: center; }
    .overlay.hidden { display: none; }
    .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 0 20px 40px; width: 100%; max-width: 430px; max-height: 92vh; overflow-y: auto; }
    .sheet-header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0 16px; border-bottom: 1px solid #f0f0f0; margin-bottom: 16px; position: sticky; top: 0; background: #fff; z-index: 1; }
    .sheet-title { font-size: 17px; font-weight: 700; color: #1a1a1a; }
    .close-btn { background: #f0f0f0; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 13px; cursor: pointer; color: #555; display: flex; align-items: center; justify-content: center; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #777; margin-bottom: 5px; }
    input, select, textarea { width: 100%; height: 44px; padding: 0 12px; border: 1.5px solid #e8e8e8; border-radius: 10px; font-size: 14px; color: #1a1a1a; background: #fafafa; outline: none; font-family: inherit; }
    textarea { height: 90px; padding: 11px 12px; resize: none; }
    .btn-row { display: flex; gap: 10px; margin-top: 8px; }
    .btn-primary { flex: 1; height: 48px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
    .btn-danger { height: 48px; padding: 0 18px; background: #fff; color: #ff4444; border: 1.5px solid #ff4444; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .btn-secondary { height: 48px; padding: 0 16px; background: #f5f5f7; color: #333; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .photo-upload-area { width: 100%; height: 110px; border: 2px dashed #e0e0e0; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fafafa; color: #aaa; font-size: 13px; margin-bottom: 14px; }
    .photo-preview-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
    .photo-remove-btn { font-size: 11px; color: #ff4444; background: #fff0f0; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; margin-bottom: 14px; }
    .detail-price-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 14px; }
    .detail-price { font-size: 26px; font-weight: 800; color: #1a1a1a; display: flex; align-items: baseline; gap: 8px; }
    .note-box { background: #fff8e1; border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #555; margin-bottom: 14px; line-height: 1.7; white-space: pre-wrap; }
    .section-title { font-size: 12px; font-weight: 700; color: #aaa; margin-bottom: 10px; margin-top: 6px; }
    .form-card { background: #f9f9f9; border-radius: 14px; padding: 14px; margin-bottom: 14px; border: 1.5px solid #efefef; }
    .record-item { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
    .edit-inline { display: none; background: #f9f9f9; border-radius: 12px; padding: 12px; margin-bottom: 4px; border: 1.5px solid #efefef; }
    .margin-hint { font-size: 12px; margin-top: -8px; margin-bottom: 14px; min-height: 18px; }
    .toast { position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%); padding: 11px 22px; border-radius: 30px; color: #fff; font-size: 13px; z-index: 1000; box-shadow: 0 4px 16px rgba(0,0,0,.2); }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:22px">📦</span>
  <span class="header-title">재고관리</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inventory')">재고 목록</button>
  <button class="tab-btn" onclick="switchTab('suppliers')">거래처</button>
</div>

<div class="content" id="tab-inventory">
  <input class="search-input" placeholder="🔍 품목명 검색" oninput="onSearch(this.value)"/>
  <div class="sup-scroll" id="sup-scroll"></div>
  <div class="list" id="item-list"></div>
</div>

<div class="content" id="tab-suppliers" style="display:none">
  <div class="list" id="supplier-list"></div>
</div>

<button class="fab" onclick="onFab()">+</button>

<div class="overlay hidden" id="overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" id="sheet"></div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
let db = JSON.parse(localStorage.getItem('stockdb') || '{"items":[],"suppliers":[]}');
let currentTab = 'inventory';
let filterSupplier = '전체';
let searchQ = '';
let modalMode = null;
let selectedId = null;

function save() { localStorage.setItem('stockdb', JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().split('T')[0]; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function sortedSuppliers() { return [...db.suppliers].sort((a,b) => a.name.localeCompare(b.name, 'ko')); }
function supOptions(id) {
  return '<option value="">선택 안 함</option>' + sortedSuppliers().map(s => `<option value="${s.id}" ${s.id===id?'selected':''}>${esc(s.name)}</option>`).join('');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = type === 'error' ? '#ff4444' : '#1a1a1a';
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2000);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === (tab === 'inventory' ? 0 : 1)));
  document.getElementById('tab-inventory').style.display = tab === 'inventory' ? '' : 'none';
  document.getElementById('tab-suppliers').style.display = tab === 'suppliers' ? '' : 'none';
  render();
}

function onSearch(v) { searchQ = v; render(); }
function onFab() { currentTab === 'inventory' ? openAddItem() : openAddSupplier(); }
function render() { currentTab === 'inventory' ? renderItems() : renderSuppliers(); }

function renderItems() {
  const chips = [{id:'전체', name:'전체'}, ...sortedSuppliers()];
  document.getElementById('sup-scroll').innerHTML = chips.map(s => `<button class="sup-chip ${filterSupplier===s.id?'active':''}" onclick="filterSupplier='${s.id}';renderItems()">${esc(s.name)}</button>`).join('');
  
  const items = db.items.filter(i => {
    const ms = i.name.includes(searchQ) || (i.note || '').includes(searchQ);
    return filterSupplier === '전체' ? ms : ms && (i.purchases || []).some(p => p.supplierId === filterSupplier);
  });
  
  const el = document.getElementById('item-list');
  if(!items.length) { el.innerHTML = '<div class="empty">목록이 비어있습니다.</div>'; return; }
  el.innerHTML = items.map(item => {
    const last = (item.purchases || []).slice(-1)[0];
    return `<div class="card" onclick="openDetail('${item.id}')">
      ${item.photo ? `<img class="card-thumb" src="${item.photo}">` : ''}
      <div style="flex:1">
        <div class="card-name">${esc(item.name)}</div>
        <div class="card-sub">${last ? '최근 매입 ₩'+last.amount.toLocaleString() : '기록 없음'}</div>
      </div>
      <div style="text-align:right"><div class="card-price">₩${(item.price||0).toLocaleString()}</div></div>
    </div>`;
  }).join('');
}

function renderSuppliers() {
  const el = document.getElementById('supplier-list');
  el.innerHTML = sortedSuppliers().map(s => `<div class="card" onclick="openEditSupplier('${s.id}')"><div style="flex:1"><div class="card-name">${esc(s.name)}</div><div class="card-sub">${esc(s.contact||'')}</div></div></div>`).join('');
}

function openModal(html) { document.getElementById('sheet').innerHTML = html; document.getElementById('overlay').classList.remove('hidden'); }
function closeModal() { document.getElementById('overlay').classList.add('hidden'); render(); }

function openAddItem() {
  modalMode = 'add_item';
  openModal(`
    <div class="sheet-header"><span class="sheet-title">품목 추가</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>품목명 *</label><input type="text" id="f-name"></div>
    <div class="form-group"><label>매입가 *</label><input type="number" id="f-buy" oninput="calcMarginAdd()"></div>
    <div class="form-group"><label>판매가</label><input type="number" id="f-sell" oninput="calcMarginAdd()"></div>
    <div id="margin-add-hint" class="margin-hint"></div>
    <button class="btn-primary" onclick="saveItem()">추가</button>
  `);
}

function calcMarginAdd() {
  const b = Number(document.getElementById('f-buy').value);
  const s = Number(document.getElementById('f-sell').value);
  const el = document.getElementById('margin-add-hint');
  if(b>0 && s>0) el.textContent = `마진: ${(((s-b)/b)*100).toFixed(1)}% (₩${(s-b).toLocaleString()})`;
}

function openEditItem(id) {
  const item = db.items.find(i => i.id === id);
  selectedId = id; modalMode = 'edit_item';
  openModal(`
    <div class="sheet-header"><span class="sheet-title">수정</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label>품목명</label><input type="text" id="f-name" value="${esc(item.name)}"></div>
    <div class="form-group"><label>판매가</label><input type="number" id="f-price" value="${item.price||0}"></div>
    <div class="form-group"><label>메모</label><textarea id="f-note">${esc(item.note||'')}</textarea></div>
    <div class="btn-row">
      <button class="btn-danger" onclick="deleteItem('${id}')">삭제</button>
      <button class="btn-primary" onclick="saveItem()">저장</button>
    </div>
  `);
}

function saveItem() {
  const name = document.getElementById('f-name').value.trim();
  if(!name) return showToast('이름을 입력하세요', 'error');
  if(modalMode === 'add_item') {
    const buy = Number(document.getElementById('f-buy').value);
    const sell = Number(document.getElementById('f-sell').value) || 0;
    db.items.unshift({id:uid(), name, price:sell, purchases:[{id:uid(), date:today(), amount:buy}], sales:[]});
  } else {
    db.items = db.items.map(i => i.id === selectedId ? {...i, name, price:Number(document.getElementById('f-price').value), note:document.getElementById('f-note').value} : i);
  }
  save(); closeModal();
}

function deleteItem(id) { if(confirm('삭제할까요?')) { db.items = db.items.filter(i=>i.id!==id); save(); closeModal(); } }

function openDetail(id) {
  selectedId = id;
  const item = db.items.find(i => i.id === id);
  openModal(`
    <div class="sheet-header"><span class="sheet-title">${esc(item.name)}</span><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="detail-price-row"><div>판매가: ₩${(item.price||0).toLocaleString()}</div><button onclick="openEditItem('${id}')">수정</button></div>
    <div class="section-title">매입 내역</div>
    ${(item.purchases||[]).map(p => `<div class="record-item"><span>${p.date}</span><b>₩${p.amount.toLocaleString()}</b></div>`).join('')}
    <div class="form-card">
       <input type="number" id="p-amt" placeholder="매입 금액">
       <button class="btn-primary" onclick="addPurchase('${id}')" style="margin-top:10px">기록 추가</button>
    </div>
  `);
}

function addPurchase(id) {
  const amt = Number(document.getElementById('p-amt').value);
  if(!amt) return;
  db.items = db.items.map(i => i.id === id ? {...i, purchases:[...(i.purchases||[]), {id:uid(), date:today(), amount:amt}]} : i);
  save(); openDetail(id);
}

function openAddSupplier() {
  modalMode = 'add_sup';
  openModal(`
    <div class="sheet-header"><span>거래처 추가</span></div>
    <div class="form-group"><label>이름</label><input type="text" id="s-name"></div>
    <button class="btn-primary" onclick="saveSup()">추가</button>
  `);
}

function saveSup() {
  const name = document.getElementById('s-name').value.trim();
  if(!name) return;
  db.suppliers.push({id:uid(), name});
  save(); closeModal();
}

render();
</script>
</body>
</html>
