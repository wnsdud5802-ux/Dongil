<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>재고관리 - 복구 및 개선판</title>
<style>
  /* 이전 스타일과 동일 (날짜창 100% 버그 수정 포함) */
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', sans-serif; background: #f5f5f7; max-width: 430px; margin: 0 auto; }
  .header { background: #fff; border-bottom: 1px solid #e8e8e8; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-size: 18px; font-weight: 700; }
  .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e8e8e8; }
  .tab-btn { flex: 1; padding: 12px 0; border: none; background: none; font-size: 14px; color: #999; border-bottom: 2.5px solid transparent; }
  .tab-btn.active { color: #1a1a1a; font-weight: 700; border-bottom-color: #1a1a1a; }
  .content { padding: 16px; padding-bottom: 100px; }
  .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 1.5px solid #e8e8e8; margin-bottom: 10px; outline: none; }
  
  /* 날짜 입력창 모바일 최적화 */
  input, select, textarea { 
    width: 100% !important; 
    padding: 12px; 
    border: 1.5px solid #e8e8e8; 
    border-radius: 10px; 
    font-size: 15px; 
    background: #fafafa;
    -webkit-appearance: none;
    min-height: 46px;
  }

  .card { background: #fff; border-radius: 14px; padding: 14px; display: flex; align-items: center; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); gap: 12px; }
  .card-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #f0f0f0; }
  .fab { position: fixed; bottom: 28px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: #1a1a1a; color: #fff; font-size: 28px; border: none; z-index: 200; }
  
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: flex; align-items: flex-end; justify-content: center; }
  .sheet { background: #fff; border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; }
  .hidden { display: none; }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  .primary-btn { flex: 1; padding: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-weight: 700; }
  .backup-btn { font-size: 11px; color: #666; background: #eee; border: none; padding: 4px 8px; border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div><span style="font-size:22px">📦</span> <span class="header-title">재고관리</span></div>
  <button class="backup-btn" onclick="exportData()">데이터 백업</button>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inventory')">재고 목록</button>
  <button class="tab-btn" onclick="switchTab('suppliers')">거래처</button>
</div>

<div class="content" id="tab-inventory">
  <input class="search-input" placeholder="🔍 검색어 입력" oninput="onSearch(this.value)" />
  <div class="list" id="item-list"></div>
</div>

<div class="content" id="tab-suppliers" style="display:none">
  <div class="list" id="supplier-list"></div>
</div>

<button class="fab" onclick="onFab()">+</button>

<div class="overlay hidden" id="overlay" onclick="closeModal()">
  <div class="sheet" onclick="event.stopPropagation()" id="sheet"></div>
</div>

<script>
// 데이터 복구 로직: 기존에 'stockdb'라는 이름으로 저장된 데이터가 있는지 확인
let db = JSON.parse(localStorage.getItem('stockdb') || '{"items":[],"suppliers":[]}');
let currentTab = 'inventory';
let searchQ = '';
let tempImg = "";

function save() { localStorage.setItem('stockdb', JSON.stringify(db)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

// 데이터 내보내기 (백업용)
function exportData() {
  const data = JSON.stringify(db);
  const blob = new Blob([data], {type: "text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `재고관리_백업_${new Date().toLocaleDateString()}.txt`;
  a.click();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='inventory' ? i===0 : i===1)));
  document.getElementById('tab-inventory').style.display = tab==='inventory' ? '' : 'none';
  document.getElementById('tab-suppliers').style.display = tab==='suppliers' ? '' : 'none';
  render();
}

function render() {
  if (currentTab === 'inventory') renderItems();
  else renderSuppliers();
}

function renderItems() {
  const items = db.items.filter(i => i.name.includes(searchQ));
  const el = document.getElementById('item-list');
  el.innerHTML = items.map(item => `
    <div class="card" onclick="openEditItem('${item.id}')">
      ${item.img ? `<img src="${item.img}" class="card-img">` : `<div class="card-img" style="display:flex;align-items:center;justify-content:center">📦</div>`}
      <div style="flex:1">
        <div style="font-weight:600">${item.name}</div>
        <div style="font-size:12px; color:#999">${item.note || ''}</div>
      </div>
      <div style="font-weight:800">₩${(item.price||0).toLocaleString()}</div>
    </div>`).join('');
}

function renderSuppliers() {
  const sorted = [...db.suppliers].sort((a,b) => a.name.localeCompare(b.name, 'ko')); // 가나다순 정렬
  const el = document.getElementById('supplier-list');
  el.innerHTML = sorted.map(s => `
    <div class="card">
      <div style="flex:1 font-weight:600">${s.name}</div>
      <div style="font-size:12px; color:#999">${s.contact || ''}</div>
    </div>`).join('');
}

function onFab() {
  if(currentTab === 'inventory') openAddItem();
}

function openAddItem() {
  tempImg = "";
  const supOpts = db.suppliers.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
  document.getElementById('sheet').innerHTML = `
    <h3 style="margin-bottom:15px">품목 추가</h3>
    <label>사진</label>
    <input type="file" accept="image/*" onchange="handleFile(event)" style="margin-bottom:10px">
    <label>품목명 *</label><input id="f-name">
    <label>매입가 *</label><input id="f-buy" type="number">
    <label>날짜</label><input id="f-date" type="date" value="${new Date().toISOString().split('T')[0]}">
    <label>판매가</label><input id="f-price" type="number">
    <div class="btn-row"><button class="primary-btn" onclick="saveNewItem()">추가 (맨 위로)</button></div>
  `;
  document.getElementById('overlay').classList.remove('hidden');
}

function handleFile(e) {
  const reader = new FileReader();
  reader.onload = (ev) => { tempImg = ev.target.result; };
  reader.readAsDataURL(e.target.files[0]);
}

function saveNewItem() {
  const name = document.getElementById('f-name').value;
  if(!name) return;
  const newItem = { id: uid(), name, price: Number(document.getElementById('f-price').value), img: tempImg, purchases: [] };
  db.items.unshift(newItem); // 맨 위로 추가
  save(); 
  document.getElementById('overlay').classList.add('hidden');
  render();
}

function closeModal() { document.getElementById('overlay').classList.add('hidden'); }
function onSearch(v) { searchQ = v; render(); }

render();
</script>
</body>
</html>
