<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>재고관리 시스템</title>
  <style>
    /* 기본 레이아웃 및 폰트 설정 */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, "Apple SD Gothic Neo", sans-serif; background: #f5f5f7; min-height: 100vh; max-width: 430px; margin: 0 auto; color: #1a1a1a; }
    
    /* 헤더 및 탭 */
    .header { background: #fff; border-bottom: 1px solid #e8e8e8; position: sticky; top: 0; z-index: 100; padding: 14px 20px; display: flex; align-items: center; gap: 8px; }
    .header-title { font-size: 18px; font-weight: 700; }
    .tab-bar { display: flex; background: #fff; border-bottom: 1px solid #e8e8e8; padding: 0 16px; }
    .tab-btn { flex: 1; padding: 12px 0; border: none; background: none; font-size: 13px; font-weight: 500; color: #999; cursor: pointer; border-bottom: 2px solid transparent; }
    .tab-btn.active { color: #1a1a1a; font-weight: 700; border-bottom-color: #1a1a1a; }
    
    /* 콘텐츠 영역 */
    .content { padding: 16px; padding-bottom: 100px; }
    
    /* 검색 및 거래처 필터 (핵심 수정 부분) */
    .search-section { background: #fff; padding: 16px; border-bottom: 1px solid #e8e8e8; position: sticky; top: 52px; z-index: 90; margin: 0 -16px 16px -16px; }
    .search-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1.5px solid #eee; font-size: 14px; background: #f9f9f9; outline: none; margin-bottom: 12px; }
    .filter-label { font-size: 11px; font-weight: 700; color: #bbb; margin-bottom: 8px; padding-left: 2px; text-transform: uppercase; }
    .sup-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -ms-overflow-style: none; }
    .sup-scroll::-webkit-scrollbar { display: none; }
    .sup-chip { flex-shrink: 0; padding: 7px 14px; border-radius: 10px; border: 1px solid #e0e0e0; background: #fff; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; transition: all 0.2s; }
    .sup-chip.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

    /* 리스트 및 카드 디자인 */
    .list { display: flex; flex-direction: column; gap: 12px; }
    .card { background: #fff; border-radius: 16px; padding: 16px; display: flex; align-items: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.04); gap: 14px; border: 1px solid rgba(0,0,0,0.02); }
    .card-thumb { width: 56px; height: 56px; object-fit: cover; border-radius: 12px; background: #f0f0f0; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .badge-row { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 4px; }
    .badge { font-size: 10px; font-weight: 700; background: #f0f2f5; color: #667085; padding: 2px 8px; border-radius: 6px; }
    .card-price-area { text-align: right; flex-shrink: 0; }
    .card-price { font-size: 16px; font-weight: 800; color: #1a1a1a; }
    .card-label { font-size: 10px; color: #aaa; margin-top: 2px; }

    /* 플로팅 버튼 */
    .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 18px; background: #1a1a1a; color: #fff; font-size: 30px; border: none; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 200; display: flex; align-items: center; justify-content: center; }

    /* 모달/바텀시트 */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: flex; align-items: flex-end; justify-content: center; transition: opacity 0.3s; }
    .overlay.hidden { display: none; opacity: 0; }
    .sheet { background: #fff; border-radius: 24px 24px 0 0; padding: 0 24px 40px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; }
    .sheet-header { position: sticky; top: 0; background: #fff; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f5f5f5; z-index: 10; margin-bottom: 20px; }
    
    /* 폼 요소 */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #555; margin-bottom: 6px; }
    input, select, textarea { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 12px; font-size: 14px; outline: none; font-family: inherit; }
    .btn-primary { width: 100%; height: 52px; background: #1a1a1a; color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    
    .empty { text-align: center; color: #ccc; padding: 80px 0; font-size: 14px; line-height: 1.6; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 1000; }
    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:20px">📦</span>
  <span class="header-title">재고관리</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('inventory')">재고 목록</button>
  <button class="tab-btn" onclick="switchTab('suppliers')">거래처 관리</button>
</div>

<!-- 재고 목록 탭 -->
<div class="content" id="tab-inventory">
  <div class="search-section">
    <input type="text" class="search-input" id="search-input" placeholder="품목명 또는 메모 검색..." oninput="handleSearch()">
    <div class="filter-label">거래처 필터</div>
    <div class="sup-scroll" id="sup-filter-list">
      <!-- 거래처 칩이 여기에 생성됨 -->
    </div>
  </div>
  <div class="list" id="item-list"></div>
</div>

<!-- 거래처 관리 탭 -->
<div class="content" id="tab-suppliers" style="display:none">
  <div class="list" id="supplier-list"></div>
</div>

<button class="fab" onclick="onFabClick()">+</button>

<!-- 모달 레이어 -->
<div class="overlay hidden" id="overlay" onclick="if(event.target===this) closeModal()">
  <div class="sheet" id="sheet" onclick="event.stopPropagation()"></div>
</div>

<script>
/** 데이터 구조 및 초기화 **/
let db = JSON.parse(localStorage.getItem('stock_master_db') || '{"items":[], "suppliers":[]}');
let currentTab = 'inventory';
let selectedSupplierId = 'all'; // 현재 선택된 필터 거래처 ID
let searchQuery = '';

function save() {
  localStorage.setItem('stock_master_db', JSON.stringify(db));
}

/** 탭 전환 **/
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
    btn.classList.toggle('active', (idx === 0 && tab === 'inventory') || (idx === 1 && tab === 'suppliers'));
  });
  document.getElementById('tab-inventory').style.display = tab === 'inventory' ? '' : 'none';
  document.getElementById('tab-suppliers').style.display = tab === 'suppliers' ? '' : 'none';
  render();
}

/** 검색 및 필터 핸들링 **/
function handleSearch() {
  searchQuery = document.getElementById('search-input').value.toLowerCase();
  renderItems();
}

function setSupplierFilter(id) {
  selectedSupplierId = id;
  renderItems();
}

/** 거래처 필터 칩 렌더링 **/
function renderFilterChips() {
  const container = document.getElementById('sup-filter-list');
  let html = `<div class="sup-chip ${selectedSupplierId === 'all' ? 'active' : ''}" onclick="setSupplierFilter('all')">전체보기</div>`;
  
  // 가나다순 정렬된 거래처 목록
  const sortedSups = [...db.suppliers].sort((a, b) => a.name.localeCompare(b.name, 'ko'));
  
  sortedSups.forEach(sup => {
    html += `<div class="sup-chip ${selectedSupplierId === sup.id ? 'active' : ''}" onclick="setSupplierFilter('${sup.id}')">${sup.name}</div>`;
  });
  
  container.innerHTML = html;
}

/** 재고 목록 렌더링 **/
function renderItems() {
  renderFilterChips(); // 필터 UI 동기화
  const listEl = document.getElementById('item-list');
  
  // 필터링 로직
  const filtered = db.items.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(searchQuery) || (item.note || "").toLowerCase().includes(searchQuery);
    
    // 거래처 필터 적용 (매입 기록 중 해당 거래처가 있는지 확인)
    let matchesSupplier = true;
    if (selectedSupplierId !== 'all') {
      matchesSupplier = (item.purchases || []).some(p => p.supplierId === selectedSupplierId);
    }
    
    return matchesSearch && matchesSupplier;
  });

  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty">검색 결과가 없습니다.<br>거래처 필터나 검색어를 확인해보세요.</div>`;
    return;
  }

  listEl.innerHTML = filtered.map(item => {
    const lastPurchase = (item.purchases || []).slice(-1)[0];
    const supNames = (item.purchases || []).map(p => {
      const s = db.suppliers.find(x => x.id === p.supplierId);
      return s ? s.name : null;
    }).filter((v, i, a) => v && a.indexOf(v) === i); // 중복 제거

    return `
      <div class="card" onclick="openItemDetail('${item.id}')">
        ${item.photo ? `<img src="${item.photo}" class="card-thumb">` : `<div class="card-thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">📦</div>`}
        <div class="card-info">
          <div class="badge-row">${supNames.map(n => `<span class="badge">${n}</span>`).join('')}</div>
          <div class="card-name">${item.name}</div>
          <div style="font-size:11px; color:#999">${lastPurchase ? `최근 매입: ${lastPurchase.date}` : '기록 없음'}</div>
        </div>
        <div class="card-price-area">
          <div class="card-price">₩${(item.price || 0).toLocaleString()}</div>
          <div class="card-label">판매가</div>
        </div>
      </div>
    `;
  }).join('');
}

/** 거래처 관리 렌더링 **/
function renderSuppliers() {
  const listEl = document.getElementById('supplier-list');
  const sorted = [...db.suppliers].sort((a, b) => a.name.localeCompare(b.name, 'ko'));

  if (sorted.length === 0) {
    listEl.innerHTML = `<div class="empty">등록된 거래처가 없습니다.<br>오른쪽 하단 + 버튼으로 추가하세요.</div>`;
    return;
  }

  listEl.innerHTML = sorted.map(s => `
    <div class="card" onclick="openEditSupplier('${s.id}')">
      <div style="flex:1">
        <div class="card-name">${s.name}</div>
        <div style="font-size:12px; color:#666">${s.contact || '연락처 없음'}</div>
      </div>
      <div style="color:#ccc">❯</div>
    </div>
  `).join('');
}

function render() {
  if (currentTab === 'inventory') renderItems();
  else renderSuppliers();
}

/** 모달 공통 **/
function openModal(html) {
  document.getElementById('sheet').innerHTML = html;
  document.getElementById('overlay').classList.remove('hidden');
}
function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  render();
}

/** 추가 버튼 클릭 **/
function onFabClick() {
  if (currentTab === 'inventory') {
    openModal(`
      <div class="sheet-header"><span style="font-weight:700">새 품목 등록</span><button onclick="closeModal()" style="border:none;background:none;font-size:20px">✕</button></div>
      <div class="form-group">
        <label>품목명 *</label>
        <input type="text" id="new-item-name" placeholder="품목명을 입력하세요">
      </div>
      <div class="form-group">
        <label>기본 판매가 (원)</label>
        <input type="number" id="new-item-price" placeholder="0">
      </div>
      <button class="btn-primary" onclick="saveNewItem()">등록하기</button>
    `);
  } else {
    openModal(`
      <div class="sheet-header"><span style="font-weight:700">새 거래처 등록</span><button onclick="closeModal()" style="border:none;background:none;font-size:20px">✕</button></div>
      <div class="form-group">
        <label>거래처명 *</label>
        <input type="text" id="new-sup-name" placeholder="거래처 이름을 입력하세요">
      </div>
      <div class="form-group">
        <label>연락처</label>
        <input type="text" id="new-sup-contact" placeholder="010-0000-0000">
      </div>
      <button class="btn-primary" onclick="saveNewSupplier()">등록하기</button>
    `);
  }
}

/** 품목 저장 **/
function saveNewItem() {
  const name = document.getElementById('new-item-name').value.trim();
  const price = parseInt(document.getElementById('new-item-price').value) || 0;
  if(!name) return alert('이름을 입력해주세요.');
  
  db.items.push({ id: Date.now().toString(), name, price, purchases: [], sales: [] });
  save(); closeModal();
}

/** 거래처 저장 **/
function saveNewSupplier() {
  const name = document.getElementById('new-sup-name').value.trim();
  const contact = document.getElementById('new-sup-contact').value.trim();
  if(!name) return alert('이름을 입력해주세요.');
  
  db.suppliers.push({ id: Date.now().toString(), name, contact });
  save(); closeModal();
}

/** 상세/매입 기록 (여기서 거래처를 연결함) **/
function openItemDetail(id) {
  const item = db.items.find(x => x.id === id);
  const supOptions = db.suppliers.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  
  openModal(`
    <div class="sheet-header"><span style="font-weight:700">${item.name} 상세</span><button onclick="closeModal()" style="border:none;background:none;font-size:20px">✕</button></div>
    <div style="background:#f9f9f9; padding:16px; border-radius:12px; margin-bottom:20px">
      <div style="font-size:12px; color:#888; margin-bottom:4px">현재 판매가</div>
      <div style="font-size:20px; font-weight:800">₩${item.price.toLocaleString()}</div>
    </div>
    
    <div class="form-group" style="background:#fff; border:1px solid #eee; padding:16px; border-radius:12px">
      <label style="color:#1a1a1a">➕ 매입 기록 추가 (이 품목의 거래처 지정)</label>
      <div style="display:flex; gap:8px; margin-top:10px">
        <select id="p-sup-id" style="flex:1">${supOptions || '<option>거래처 없음</option>'}</select>
        <input type="number" id="p-amount" placeholder="매입단가" style="flex:1">
      </div>
      <button class="btn-primary" style="height:40px; font-size:13px" onclick="addPurchase('${item.id}')">매입 기록 저장</button>
    </div>
    
    <div style="margin-top:20px">
      <label>최근 매입 이력</label>
      ${(item.purchases || []).reverse().map(p => {
        const s = db.suppliers.find(x => x.id === p.supplierId);
        return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #f5f5f5; font-size:13px">
          <span>${p.date} (${s ? s.name : '알수없음'})</span>
          <span style="font-weight:700">₩${p.amount.toLocaleString()}</span>
        </div>`;
      }).join('') || '<div style="color:#ccc; font-size:12px; padding:10px 0">기록이 없습니다.</div>'}
    </div>
  `);
}

function addPurchase(itemId) {
  const supId = document.getElementById('p-sup-id').value;
  const amount = parseInt(document.getElementById('p-amount').value);
  if(!supId || !amount) return alert('거래처와 금액을 확인하세요.');
  
  const item = db.items.find(x => x.id === itemId);
  item.purchases.push({
    date: new Date().toISOString().split('T')[0],
    supplierId: supId,
    amount: amount
  });
  
  save();
  openItemDetail(itemId); // 새로고침
}

// 초기 실행
render();
</script>

</body>
</html>
